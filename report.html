<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我的血糖">
<link rel="apple-touch-icon" href="icon-report.png">
<link rel="icon" type="image/png" href="icon-report.png">
<link rel="manifest" href="manifest-report.json">
<title>爸爸的血糖记录 · Dad's Glucose Tracker</title>
<style>
  .viz-root {
    color-scheme: light;
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --gridline: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --good: #0ca30c;
    --good-text: #006300;
    --critical: #d03b3b;
    --band: rgba(42,120,214,0.07);
    --connector: #c3c2b7;
    --star-bg: #fdf6e3;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) .viz-root {
      color-scheme: dark;
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --gridline: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255,255,255,0.10);
      --good: #0ca30c;
      --good-text: #0ca30c;
      --critical: #d03b3b;
      --band: rgba(57,135,229,0.12);
      --connector: #383835;
      --star-bg: #26241d;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body.viz-root {
    font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    padding: 16px;
    max-width: 560px;
    margin: 0 auto;
  }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
  }
  header.card { text-align: center; }
  h1 { font-size: 24px; font-weight: 700; }
  .sub { color: var(--text-secondary); font-size: 15px; margin-top: 4px; }

  .lang-toggle {
    display: inline-flex; margin-top: 12px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--page); overflow: hidden;
  }
  .lang-toggle button {
    font: inherit; font-size: 14px; font-weight: 600;
    padding: 7px 18px; border: none; background: transparent;
    color: var(--text-secondary); cursor: pointer; border-radius: 999px;
  }
  .lang-toggle button.active { background: var(--text-primary); color: var(--surface-1); }

  .view-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .view-toggle button {
    flex: 1; font: inherit; font-size: 16px; font-weight: 600;
    padding: 11px 0; border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface-1); color: var(--text-secondary); cursor: pointer;
  }
  .view-toggle button.active { background: var(--text-primary); color: var(--surface-1); border-color: var(--text-primary); }

  .log-now {
    display: block; text-align: center; text-decoration: none;
    background: var(--good); color: #fff; font-size: 19px; font-weight: 700;
    border-radius: 14px; padding: 15px; margin-bottom: 14px;
  }

  .picker { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 14px; }
  .picker button {
    font: inherit; font-size: 18px; font-weight: 700; line-height: 1;
    width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 50%;
    background: var(--surface-1); color: var(--text-primary); cursor: pointer;
  }
  .picker button:disabled { opacity: 0.3; cursor: default; }
  .picker .p-label { font-size: 17px; font-weight: 700; min-width: 170px; text-align: center; }

  .stats { display: flex; gap: 10px; }
  .stats .card { flex: 1; text-align: center; padding: 14px 6px; margin-bottom: 0; }
  .stat-label { font-size: 14px; color: var(--text-secondary); }
  .stat-value { font-size: 30px; font-weight: 600; margin-top: 2px; }
  .stat-unit { font-size: 13px; color: var(--text-muted); }
  .stat-good { color: var(--good-text); }
  .stats-wrap { margin-bottom: 14px; }

  h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .h2-note { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

  .legend { display: flex; gap: 16px; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  .chart-wrap { position: relative; }
  svg { display: block; width: 100%; height: auto; }
  .tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--text-primary); color: var(--surface-1);
    font-size: 13px; line-height: 1.5; padding: 7px 10px; border-radius: 8px;
    transform: translate(-50%, -110%); white-space: nowrap; z-index: 5;
  }

  .streak { display: flex; gap: 6px; justify-content: space-between; }
  .day-cell { flex: 1; text-align: center; background: var(--star-bg); border-radius: 10px; padding: 8px 0; }
  .day-cell.dim { background: transparent; border: 1px dashed var(--gridline); opacity: 0.6; }
  .day-cell .dname { font-size: 13px; color: var(--text-secondary); }
  .day-cell .star { font-size: 20px; margin-top: 2px; min-height: 26px; }
  .streak-msg { text-align: center; font-size: 16px; margin-top: 12px; font-weight: 600; }
  .streak-msg .n { color: var(--good-text); }

  .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal .cal-h { text-align: center; font-size: 12px; color: var(--text-muted); padding: 2px 0; }
  .cal .cal-d {
    text-align: center; background: var(--star-bg); border-radius: 8px; padding: 4px 0 2px;
    font-size: 11px; color: var(--text-secondary); min-height: 40px;
  }
  .cal .cal-d .star { font-size: 16px; line-height: 1.3; }
  .cal .cal-d.empty { background: transparent; }
  .cal .cal-d.miss { background: var(--gridline); opacity: 0.7; }
  .cal .cal-d.future { background: transparent; border: 1px dashed var(--gridline); opacity: 0.6; }

  .reward-bar { background: var(--gridline); border-radius: 999px; height: 14px; overflow: hidden; margin: 10px 0 6px; }
  .reward-fill { background: var(--good); height: 100%; border-radius: 999px; transition: width 0.3s; }
  .reward-line { font-size: 15px; color: var(--text-secondary); }
  .reward-hit { font-size: 17px; font-weight: 700; margin-top: 8px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: var(--text-muted); font-weight: 500; padding: 6px 4px; border-bottom: 1px solid var(--gridline); }
  td { padding: 7px 4px; border-bottom: 1px solid var(--gridline); color: var(--text-secondary); white-space: nowrap; }
  td.what { max-width: 130px; overflow: hidden; text-overflow: ellipsis; }
  td.num { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text-primary); }
  tr:last-child td { border-bottom: none; }
  .flag-good { color: var(--good-text); font-weight: 600; }
  .flag-high { color: var(--critical); font-weight: 700; }
  .hidden { display: none; }

  .note { font-size: 13px; color: var(--text-muted); text-align: center; padding-bottom: 4px; }
  .insight { background: var(--band); border-radius: 10px; padding: 12px 14px; font-size: 15px; line-height: 1.6; margin-top: 12px; }
  .empty-msg { text-align: center; color: var(--text-muted); font-size: 15px; padding: 30px 0; }
  .loading { text-align: center; color: var(--text-muted); font-size: 16px; padding: 60px 0; }

  .reset-link {
    display: block; margin: 6px auto 20px; text-align: center;
    font-size: 13px; color: var(--text-muted); background: none; border: none;
    cursor: pointer; text-decoration: underline; font-family: inherit;
  }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .modal-bg.hidden { display: none; }
  .modal {
    background: var(--surface-1); border-radius: 16px; padding: 22px; max-width: 360px; width: 100%;
  }
  .modal h3 { font-size: 19px; margin-bottom: 10px; }
  .modal p { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; }
  .modal input {
    width: 100%; font: inherit; font-size: 17px; padding: 11px 12px;
    border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px;
    background: var(--page); color: var(--text-primary);
  }
  .modal .row { display: flex; gap: 10px; }
  .modal button {
    flex: 1; font: inherit; font-size: 17px; font-weight: 700;
    padding: 13px 0; border-radius: 12px; border: none; cursor: pointer;
  }
  .m-cancel { background: var(--gridline); color: var(--text-primary); }
  .m-confirm { background: var(--critical); color: #fff; }
  .m-confirm:disabled { opacity: 0.35; cursor: default; }
</style>
</head>
<body class="viz-root" data-palette="#0ca30c,#d03b3b">

<header class="card">
  <h1 id="t-title"></h1>
  <div class="sub" id="t-range"></div>
  <div class="lang-toggle" role="group" aria-label="Language / 语言">
    <button id="btn-zh" onclick="setLang('zh')">中文</button>
    <button id="btn-en" onclick="setLang('en')">English</button>
  </div>
</header>

<div class="view-toggle" role="group" aria-label="View / 视图">
  <button id="btn-day" onclick="setView('day')"></button>
  <button id="btn-week" onclick="setView('week')"></button>
  <button id="btn-month" onclick="setView('month')"></button>
</div>

<a class="log-now" id="link-log" href="index.html"></a>

<div class="loading" id="loading"></div>
<div class="card hidden" id="error-card" style="text-align:center;">
  <div class="empty-msg" id="error-msg"></div>
  <button class="m-cancel" id="retry-btn" onclick="init()" style="font:inherit; font-weight:700; padding:12px 28px; border-radius:12px; border:none; cursor:pointer;"></button>
</div>

<div id="content" class="hidden">

<div class="picker">
  <button id="p-prev" onclick="stepAnchor(-1)">‹</button>
  <div class="p-label" id="p-label"></div>
  <button id="p-next" onclick="stepAnchor(1)">›</button>
</div>

<div class="stats stats-wrap">
  <div class="card">
    <div class="stat-label" id="s1-label"></div>
    <div class="stat-value" id="s1-value"></div>
    <div class="stat-unit">mmol/L</div>
  </div>
  <div class="card">
    <div class="stat-label" id="s2-label"></div>
    <div class="stat-value stat-good" id="s2-value"></div>
    <div class="stat-unit" id="s2-unit"></div>
  </div>
  <div class="card">
    <div class="stat-label" id="s3-label"></div>
    <div class="stat-value" id="s3-value"></div>
    <div class="stat-unit" id="s3-unit"></div>
  </div>
</div>

<section class="card">
  <h2 id="t-chart-h"></h2>
  <div class="h2-note" id="t-chart-note"></div>
  <div class="legend">
    <span><span class="dot" style="background:var(--good)"></span><span id="t-leg-good"></span></span>
    <span><span class="dot" style="background:var(--critical)"></span><span id="t-leg-high"></span></span>
  </div>
  <div class="chart-wrap">
    <svg id="chart" viewBox="0 0 520 300" role="img" aria-label="Glucose chart"></svg>
    <div class="tooltip" id="tip"></div>
  </div>
</section>

<section class="card" id="card-star">
  <h2 id="t-star-h"></h2>
  <div class="h2-note" id="t-star-note"></div>
  <div class="streak" id="streakrow"></div>
  <div class="cal hidden" id="calgrid"></div>
  <div class="streak-msg" id="t-star-msg"></div>
</section>

<section class="card" id="card-reward">
  <h2 id="t-reward-h"></h2>
  <div class="reward-line" id="t-reward-line"></div>
  <div class="reward-bar"><div class="reward-fill" id="reward-fill"></div></div>
  <div class="reward-hit" id="t-reward-hit"></div>
</section>

<section class="card" id="card-insight">
  <h2 id="t-insight-h"></h2>
  <div class="insight" id="t-insight"></div>
</section>

<section class="card">
  <h2 id="t-log-h"></h2>
  <table>
    <thead><tr id="loghead"></tr></thead>
    <tbody id="logbody"></tbody>
  </table>
  <div class="empty-msg hidden" id="log-empty"></div>
</section>

<div class="note" id="t-note"></div>
<button class="reset-link" id="reset-link" onclick="openReset()"></button>

</div>

<div class="modal-bg hidden" id="modal-bg">
  <div class="modal">
    <h3 id="m-title"></h3>
    <p id="m-text"></p>
    <input id="m-input" autocomplete="off" oninput="resetInputChanged()">
    <div class="row">
      <button class="m-cancel" id="m-cancel" onclick="closeReset()"></button>
      <button class="m-confirm" id="m-confirm" onclick="doReset()" disabled></button>
    </div>
  </div>
</div>

<script>
// ====== backend endpoint (same one the logging page posts to) ======
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbziaghYfMv1nmmnIdXfq_Xbg1wvgehk6Yx5KTZVn3uz3A8eBPTUYgfw1kcpF1BUKrxGeQ/exec';

// ================= i18n =================
const I18N = {
  zh: {
    title: '👴 爸爸的血糖记录',
    viewDay: '日', viewWeek: '周', viewMonth: '月',
    logNow: '＋ 记血糖',
    loading: '载入中… ⏳',
    loadError: '载入数据失败，请检查网络再试一次',
    retry: '重试',
    dows: ['日','一','二','三','四','五','六'],
    dowMonFirst: ['一','二','三','四','五','六','日'],
    dateShort: d => `${d.getMonth()+1}/${d.getDate()}（${I18N.zh.dows[d.getDay()]}）`,
    dateLong: d => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${I18N.zh.dows[d.getDay()]}）`,
    weekLabel: (a,b) => `${a.getMonth()+1}月${a.getDate()}日 – ${b.getMonth()+1}月${b.getDate()}日`,
    monthLabel: d => `${d.getFullYear()}年${d.getMonth()+1}月`,
    avgLabel: '平均血糖', inrangeLabel: '达标次数', unitReadings: '次测量',
    logsToday: '当天记录', unitTimes: '次',
    daysLogged: '记录天数', unitDays: '天 ⭐',
    chartHDay: '当天血糖', chartHWeek: '本周血糖走势', chartHMonth: '血糖（每日平均）',
    chartNote: '目标范围 4.0 – 10.0 mmol/L（空腹 ≤ 7.0）',
    chartNoteMonth: '每点为当天平均 · 红色 = 当天有偏高读数',
    legGood: '✓ 达标', legHigh: '! 偏高 / 偏低',
    fastGuide: '空腹目标 ≤ 7.0', bandLabel: '目标范围 4.0–10.0',
    starH: '记录之星 ⭐', starNoteWeek: '每天有记录就得一颗星', starNoteMonth: '星星月历',
    starMsgWeek: n => n > 0 ? `本周 <span class="n">${n}</span> 天有记录 👏` : '这周还没有记录，加油！',
    starMsgMonth: (n, total) => `本月已记录 <span class="n">${n}</span>/${total} 天`,
    rewardH: '本周奖励 🎁',
    rewardLine: n => `目标：一周 7 天都有记录 · 已记录 <b>${n}/7 天</b>`,
    rewardHit: '✅ 达标！这周的奖励到手了 🎉',
    rewardMiss: n => `还差 ${7 - n} 天，继续加油！`,
    insightH: '本周小发现 💡',
    insightHigh: (dateStr, meal, foods, v) => `${dateStr}${meal}${foods ? `（${foods}）` : ''}后，血糖到了 <b>${v}</b>，是本周最高的一次。下次可以少吃一点试试看。`,
    insightAllGood: '这周所有测量都在目标以内，非常棒！继续保持 👏',
    insightNoData: '这周还没有血糖测量。记得饭前或饭后量一量哦。',
    logH: '记录', logHMonth: '每日小结',
    logCols: ['日期', '时间', '记录', '血糖', '状态'],
    logColsMonth: ['日期', '记录', '平均', '异常'],
    fasting: '空腹', post: '饭后2小时', reading: '血糖',
    meals: {breakfast:'早餐', lunch:'午餐', snack:'点心', dinner:'晚餐', test:'测血糖'},
    ok: '✓ 达标', high: '! 偏高', low: '! 偏低', none: '—',
    highCount: n => n === 0 ? '—' : `${n} 次`,
    noRecords: '这段时间没有记录',
    noReadings: '这段时间没有血糖测量',
    note: '数据来自记录表，实时更新',
    resetLink: '🗑 清空所有数据 Reset all data',
    mTitle: '⚠️ 清空所有数据？',
    mText: '这会永久删除全部记录，无法复原。如果确定要清空，请在下面输入 RESET：',
    mPlaceholder: '输入 RESET',
    mCancel: '取消',
    mConfirm: '清空',
    resetDone: '已清空',
  },
  en: {
    title: "👴 Dad's Glucose Tracker",
    viewDay: 'Daily', viewWeek: 'Weekly', viewMonth: 'Monthly',
    logNow: '＋ Log a reading',
    loading: 'Loading… ⏳',
    loadError: 'Could not load data — check the connection and try again',
    retry: 'Retry',
    dows: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    dowMonFirst: ['M','T','W','T','F','S','S'],
    dateShort: d => `${I18N.en.dows[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}`,
    dateLong: d => `${I18N.en.dows[d.getDay()]}, ${d.toLocaleString('en', {month:'short'})} ${d.getDate()}, ${d.getFullYear()}`,
    weekLabel: (a,b) => `${a.toLocaleString('en', {month:'short'})} ${a.getDate()} – ${b.toLocaleString('en', {month:'short'})} ${b.getDate()}`,
    monthLabel: d => `${d.toLocaleString('en', {month:'long'})} ${d.getFullYear()}`,
    avgLabel: 'Average glucose', inrangeLabel: 'In range', unitReadings: 'readings',
    logsToday: 'Logs today', unitTimes: 'entries',
    daysLogged: 'Days logged', unitDays: 'days ⭐',
    chartHDay: "The day's readings", chartHWeek: 'Glucose trend', chartHMonth: 'Glucose (daily averages)',
    chartNote: 'Target range 4.0 – 10.0 mmol/L (fasting ≤ 7.0)',
    chartNoteMonth: 'Each dot = daily average · red = a high reading that day',
    legGood: '✓ In range', legHigh: '! High / Low',
    fastGuide: 'Fasting target ≤ 7.0', bandLabel: 'Target range 4.0–10.0',
    starH: 'Star tracker ⭐', starNoteWeek: 'One star for every day with a log', starNoteMonth: 'Star calendar',
    starMsgWeek: n => n > 0 ? `<span class="n">${n}</span> day(s) logged this week 👏` : 'No logs yet this week — you can do it!',
    starMsgMonth: (n, total) => `<span class="n">${n}</span>/${total} days logged this month`,
    rewardH: "This week's reward 🎁",
    rewardLine: n => `Goal: log something every day · <b>${n}/7 days</b>`,
    rewardHit: '✅ Goal met! Reward unlocked 🎉',
    rewardMiss: n => `${7 - n} more day(s) to go!`,
    insightH: 'Insight of the week 💡',
    insightHigh: (dateStr, meal, foods, v) => `After ${meal.toLowerCase()}${foods ? ` (${foods})` : ''} on ${dateStr}, glucose reached <b>${v}</b> — the highest this week. Worth trying a smaller portion next time.`,
    insightAllGood: 'Every reading this week was within target — excellent! Keep it up 👏',
    insightNoData: 'No glucose readings this week yet. Remember to test before or after meals.',
    logH: 'Log', logHMonth: 'Daily summary',
    logCols: ['Date', 'Time', 'Entry', 'Glucose', 'Status'],
    logColsMonth: ['Date', 'Logs', 'Avg', 'Flagged'],
    fasting: 'Fasting', post: '2h after meal', reading: 'Reading',
    meals: {breakfast:'Breakfast', lunch:'Lunch', snack:'Snack', dinner:'Dinner', test:'Glucose test'},
    ok: '✓ In range', high: '! High', low: '! Low', none: '—',
    highCount: n => n === 0 ? '—' : `${n}×`,
    noRecords: 'No records in this period',
    noReadings: 'No glucose readings in this period',
    note: 'Live data from the log sheet',
    resetLink: '🗑 清空所有数据 Reset all data',
    mTitle: '⚠️ Erase ALL data?',
    mText: 'This permanently deletes every record and cannot be undone. If you are sure, type RESET below:',
    mPlaceholder: 'Type RESET',
    mCancel: 'Cancel',
    mConfirm: 'Erase',
    resetDone: 'All data erased',
  }
};

// ================= state & data =================
let lang = 'zh', view = 'week';
let anchor = new Date();            // the date the current view centres on
let entries = [];                   // {t: Date, meal, foods, glu, timing}
const $ = id => document.getElementById(id);
const T = () => I18N[lang];

const startOfDay = d => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
const mondayOf = d => addDays(startOfDay(d), -((d.getDay() + 6) % 7));
const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
const today = () => startOfDay(new Date());
const hhmm = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
const avg = a => a.reduce((s, r) => s + r.glu, 0) / a.length;

function isHigh(r) { return r.timing === 'fasting' ? r.glu > 7.0 : r.glu >= 10.0; }
function isLow(r) { return r.glu < 4.0; }
function inRange(r) { return !isHigh(r) && !isLow(r); }
function statusLabel(r) { return isLow(r) ? T().low : isHigh(r) ? T().high : T().ok; }
function timingLabel(r) {
  if (r.timing === 'fasting') return T().fasting;
  if (r.timing === 'post') return T().post;
  return T().reading;
}
function mealLabel(r) { return T().meals[r.meal] || r.meal || T().reading; }

async function init() {
  $('loading').classList.remove('hidden');
  $('error-card').classList.add('hidden');
  $('content').classList.add('hidden');
  $('loading').textContent = T().loading;
  try {
    const res = await fetch(SCRIPT_URL + '?action=data');
    const j = await res.json();
    entries = (j.rows || []).map(r => {
      const glu = parseFloat(r[3]);
      return {
        t: new Date(r[0]),
        meal: String(r[1] || ''),
        foods: String(r[2] || ''),
        glu: isNaN(glu) ? null : glu,
        timing: String(r[4] || ''),
      };
    }).filter(x => !isNaN(x.t.getTime())).sort((a, b) => a.t - b.t);
    $('loading').classList.add('hidden');
    $('content').classList.remove('hidden');
    render();
  } catch (err) {
    $('loading').classList.add('hidden');
    $('error-card').classList.remove('hidden');
    $('error-msg').textContent = T().loadError;
    $('retry-btn').textContent = T().retry;
  }
}

// range of the current view: [start, end] inclusive days
function viewRange() {
  if (view === 'day') { const d = startOfDay(anchor); return [d, d]; }
  if (view === 'week') { const m = mondayOf(anchor); return [m, addDays(m, 6)]; }
  const f = new Date(anchor.getFullYear(), anchor.getMonth(), 1);
  return [f, new Date(anchor.getFullYear(), anchor.getMonth() + 1, 0)];
}
function entriesIn(a, b) {
  const end = addDays(b, 1);
  return entries.filter(x => x.t >= a && x.t < end);
}
const readingsOf = list => list.filter(x => x.glu !== null);
const daysWithLog = (a, b) => {
  const s = new Set();
  entriesIn(a, b).forEach(x => s.add(startOfDay(x.t).getTime()));
  return s;
};

function stepAnchor(dir) {
  if (view === 'day') anchor = addDays(anchor, dir);
  else if (view === 'week') anchor = addDays(anchor, dir * 7);
  else anchor = new Date(anchor.getFullYear(), anchor.getMonth() + dir, 1);
  render();
}

// ================= chart plumbing =================
const W = 520, H = 300, padL = 34, padR = 12, padT = 14, padB = 34;
const yMin = 3, yMax = 13;
const plotW = W - padL - padR, plotH = H - padT - padB;
const yPosBase = v => padT + (yMax - Math.min(yMax, Math.max(yMin, v))) / (yMax - yMin) * plotH;
const css = n => getComputedStyle(document.body).getPropertyValue(n).trim();
const svg = $('chart');
const NS = 'http://www.w3.org/2000/svg';
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const tip = $('tip');
function tipAt(cx, cy, html) {
  const rect = svg.getBoundingClientRect();
  tip.style.left = (cx / W * rect.width) + 'px';
  tip.style.top = (cy / H * rect.height) + 'px';
  tip.innerHTML = html;
  tip.style.display = 'block';
}
function hideTip() { tip.style.display = 'none'; }
function colors() {
  return { grid: css('--gridline'), base: css('--baseline'), muted: css('--text-muted'),
    sec: css('--text-secondary'), good: css('--good'), crit: css('--critical'),
    surf: css('--surface-1'), conn: css('--connector'), band: css('--band') };
}
function chartBase(C) {
  svg.innerHTML = '';
  svg.appendChild(el('rect', {x: padL, y: yPosBase(10), width: plotW, height: yPosBase(4) - yPosBase(10), fill: C.band}));
  [4, 6, 8, 10, 12].forEach(v => {
    svg.appendChild(el('line', {x1: padL, y1: yPosBase(v), x2: W - padR, y2: yPosBase(v), stroke: C.grid, 'stroke-width': 1}));
    const t = el('text', {x: padL - 6, y: yPosBase(v) + 4, 'text-anchor': 'end', 'font-size': 12, fill: C.muted});
    t.textContent = v; svg.appendChild(t);
  });
  svg.appendChild(el('line', {x1: padL, y1: yPosBase(7), x2: W - padR, y2: yPosBase(7), stroke: C.base, 'stroke-width': 1}));
  const g7 = el('text', {x: padL + 6, y: yPosBase(7) + 14, 'font-size': 11, fill: C.muted});
  g7.textContent = T().fastGuide; svg.appendChild(g7);
  const bl = el('text', {x: padL + 6, y: yPosBase(4) - 6, 'font-size': 11, fill: C.muted});
  bl.textContent = T().bandLabel; svg.appendChild(bl);
  svg.appendChild(el('line', {x1: padL, y1: H - padB, x2: W - padR, y2: H - padB, stroke: C.base, 'stroke-width': 1}));
}
function dotWithRing(cx, cy, color, C, hoverHtml) {
  svg.appendChild(el('circle', {cx, cy, r: 7, fill: C.surf}));
  svg.appendChild(el('circle', {cx, cy, r: 5, fill: color}));
  const hit = el('circle', {cx, cy, r: 14, fill: 'transparent', style: 'cursor:pointer'});
  hit.addEventListener('mouseenter', () => tipAt(cx, cy, hoverHtml));
  hit.addEventListener('mouseleave', hideTip);
  hit.addEventListener('click', () => tipAt(cx, cy, hoverHtml));
  svg.appendChild(hit);
}
function emptyChart(C, msg) {
  const t = el('text', {x: W / 2, y: H / 2, 'text-anchor': 'middle', 'font-size': 15, fill: C.muted});
  t.textContent = msg; svg.appendChild(t);
}

function drawDay(C, a) {
  chartBase(C);
  const data = readingsOf(entriesIn(a, a));
  [0, 6, 12, 18, 24].forEach(h => {
    const x = padL + h / 24 * plotW;
    const t = el('text', {x, y: H - padB + 18, 'text-anchor': h === 0 ? 'start' : h === 24 ? 'end' : 'middle', 'font-size': 12, fill: C.sec});
    t.textContent = `${String(h).padStart(2, '0')}:00`; svg.appendChild(t);
  });
  if (!data.length) { emptyChart(C, T().noReadings); return; }
  const xP = r => padL + (r.t.getHours() * 60 + r.t.getMinutes()) / 1440 * plotW;
  if (data.length > 1) {
    const pts = data.map(r => `${xP(r).toFixed(1)},${yPosBase(r.glu).toFixed(1)}`).join(' ');
    svg.appendChild(el('polyline', {points: pts, fill: 'none', stroke: C.conn, 'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round'}));
  }
  data.forEach(r => {
    const cx = xP(r), cy = yPosBase(r.glu);
    dotWithRing(cx, cy, inRange(r) ? C.good : C.crit, C,
      `${hhmm(r.t)} · ${timingLabel(r)}<br><b>${r.glu.toFixed(1)} mmol/L</b> ${statusLabel(r)}`);
    const lb = el('text', {x: cx, y: cy - 14, 'text-anchor': 'middle', 'font-size': 13, 'font-weight': 700, fill: C.sec});
    lb.textContent = r.glu.toFixed(1); svg.appendChild(lb);
  });
}

function drawWeek(C, a, b) {
  chartBase(C);
  const data = readingsOf(entriesIn(a, b));
  for (let i = 0; i < 7; i++) {
    const d = addDays(a, i);
    const cx = padL + (i + 0.5) / 7 * plotW;
    const t = el('text', {x: cx, y: H - padB + 18, 'text-anchor': 'middle', 'font-size': 12, fill: C.sec});
    t.textContent = T().dows[d.getDay()]; svg.appendChild(t);
    const dt = el('text', {x: cx, y: H - padB + 31, 'text-anchor': 'middle', 'font-size': 10, fill: C.muted});
    dt.textContent = `${d.getMonth()+1}/${d.getDate()}`; svg.appendChild(dt);
  }
  if (!data.length) { emptyChart(C, T().noReadings); return; }
  const xP = r => {
    const idx = Math.floor((startOfDay(r.t) - a) / 86400000);
    const frac = (r.t.getHours() * 60 + r.t.getMinutes()) / 1440;
    return padL + (idx + 0.15 + frac * 0.7) / 7 * plotW;
  };
  if (data.length > 1) {
    const pts = data.map(r => `${xP(r).toFixed(1)},${yPosBase(r.glu).toFixed(1)}`).join(' ');
    svg.appendChild(el('polyline', {points: pts, fill: 'none', stroke: C.conn, 'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round'}));
  }
  data.forEach(r => {
    dotWithRing(xP(r), yPosBase(r.glu), inRange(r) ? C.good : C.crit, C,
      `${T().dateShort(r.t)} ${hhmm(r.t)}<br>${timingLabel(r)} · <b>${r.glu.toFixed(1)} mmol/L</b> ${statusLabel(r)}`);
  });
  const hi = data.reduce((x, y) => (y.glu > x.glu ? y : x));
  if (!inRange(hi)) {
    const lb = el('text', {x: Math.min(W - padR - 30, Math.max(padL + 30, xP(hi))), y: Math.max(padT + 12, yPosBase(hi.glu) - 12), 'text-anchor': 'middle', 'font-size': 13, 'font-weight': 700, fill: C.sec});
    lb.textContent = hi.glu.toFixed(1); svg.appendChild(lb);
  }
}

function drawMonth(C, a, b) {
  chartBase(C);
  const nDays = b.getDate();
  const daily = [];
  for (let d = 1; d <= nDays; d++) {
    const day = new Date(a.getFullYear(), a.getMonth(), d);
    const rs = readingsOf(entriesIn(day, day));
    if (rs.length) daily.push({day: d, avg: avg(rs), n: rs.length, highs: rs.filter(r => !inRange(r)).length, date: day});
  }
  const xP = d => padL + (d - 0.5) / nDays * plotW;
  [1, 5, 10, 15, 20, 25, nDays].forEach(d => {
    const t = el('text', {x: xP(d), y: H - padB + 18, 'text-anchor': 'middle', 'font-size': 12, fill: C.sec});
    t.textContent = d; svg.appendChild(t);
  });
  if (!daily.length) { emptyChart(C, T().noReadings); return; }
  if (daily.length > 1) {
    const pts = daily.map(x => `${xP(x.day).toFixed(1)},${yPosBase(x.avg).toFixed(1)}`).join(' ');
    svg.appendChild(el('polyline', {points: pts, fill: 'none', stroke: C.conn, 'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round'}));
  }
  daily.forEach(x => {
    dotWithRing(xP(x.day), yPosBase(x.avg), x.highs ? C.crit : C.good, C,
      `${T().dateShort(x.date)}<br>${lang === 'zh' ? `${x.n} 次测量 · 平均` : `${x.n} readings · avg`} <b>${x.avg.toFixed(1)}</b><br>${lang === 'zh' ? `偏高 ${x.highs} 次` : `${x.highs} high`}`);
  });
}

// ================= sections =================
function renderStats(a, b) {
  const list = entriesIn(a, b);
  const rs = readingsOf(list);
  const ok = rs.filter(inRange).length;
  $('s1-label').textContent = T().avgLabel;
  $('s1-value').textContent = rs.length ? avg(rs).toFixed(1) : T().none;
  $('s2-label').textContent = T().inrangeLabel;
  $('s2-value').innerHTML = rs.length ? `${ok}<span style="font-size:16px; color:var(--text-muted);">/${rs.length}</span>` : T().none;
  $('s2-unit').textContent = T().unitReadings;
  if (view === 'day') {
    $('s3-label').textContent = T().logsToday;
    $('s3-value').textContent = String(list.length);
    $('s3-unit').textContent = T().unitTimes;
  } else if (view === 'week') {
    const n = daysWithLog(a, b).size;
    $('s3-label').textContent = T().daysLogged;
    $('s3-value').innerHTML = `${n}<span style="font-size:16px; color:var(--text-muted);">/7</span>`;
    $('s3-unit').textContent = T().unitDays;
  } else {
    const n = daysWithLog(a, b).size;
    const now = today();
    const denom = (a.getFullYear() === now.getFullYear() && a.getMonth() === now.getMonth()) ? now.getDate() : b.getDate();
    $('s3-label').textContent = T().daysLogged;
    $('s3-value').innerHTML = `${n}<span style="font-size:16px; color:var(--text-muted);">/${denom}</span>`;
    $('s3-unit').textContent = T().unitDays;
  }
}

function renderStar(a, b) {
  const logged = daysWithLog(a, b);
  const now = today();
  if (view === 'week') {
    $('streakrow').classList.remove('hidden'); $('calgrid').classList.add('hidden');
    $('t-star-note').textContent = T().starNoteWeek;
    let html = '';
    for (let i = 0; i < 7; i++) {
      const d = addDays(a, i);
      const future = d > now;
      const star = logged.has(d.getTime()) ? '⭐' : '';
      html += `<div class="day-cell${future ? ' dim' : ''}"><div class="dname">${lang === 'zh' ? T().dowMonFirst[i] : T().dows[d.getDay()]}</div><div class="star">${star}</div></div>`;
    }
    $('streakrow').innerHTML = html;
    $('t-star-msg').innerHTML = T().starMsgWeek(logged.size);
  } else {
    $('streakrow').classList.add('hidden'); $('calgrid').classList.remove('hidden');
    $('t-star-note').textContent = T().starNoteMonth;
    let cells = T().dowMonFirst.map(d => `<div class="cal-h">${d}</div>`).join('');
    const offset = (a.getDay() + 6) % 7;
    for (let i = 0; i < offset; i++) cells += '<div class="cal-d empty"></div>';
    for (let d = 1; d <= b.getDate(); d++) {
      const day = new Date(a.getFullYear(), a.getMonth(), d);
      if (day > now) cells += `<div class="cal-d future">${d}</div>`;
      else if (logged.has(day.getTime())) cells += `<div class="cal-d">${d}<div class="star">⭐</div></div>`;
      else cells += `<div class="cal-d miss">${d}</div>`;
    }
    $('calgrid').innerHTML = cells;
    const denom = (a.getFullYear() === now.getFullYear() && a.getMonth() === now.getMonth()) ? now.getDate() : b.getDate();
    $('t-star-msg').innerHTML = T().starMsgMonth(logged.size, denom);
  }
}

function renderReward(a, b) {
  const n = daysWithLog(a, b).size;
  $('t-reward-h').innerHTML = T().rewardH;
  $('t-reward-line').innerHTML = T().rewardLine(n);
  $('reward-fill').style.width = Math.min(100, n / 7 * 100) + '%';
  $('t-reward-hit').innerHTML = n >= 7 ? T().rewardHit : T().rewardMiss(n);
}

function renderInsight(a, b) {
  const rs = readingsOf(entriesIn(a, b));
  $('t-insight-h').textContent = T().insightH;
  if (!rs.length) { $('t-insight').innerHTML = T().insightNoData; return; }
  const highs = rs.filter(isHigh);
  if (!highs.length) { $('t-insight').innerHTML = T().insightAllGood; return; }
  const hi = highs.reduce((x, y) => (y.glu > x.glu ? y : x));
  // find the meal logged closest before this reading on the same day
  const sameDayMeals = entries.filter(x => sameDay(x.t, hi.t) && x.meal && x.meal !== 'test' && x.t <= hi.t);
  const mealE = sameDayMeals.length ? sameDayMeals[sameDayMeals.length - 1] : (hi.meal && hi.meal !== 'test' ? hi : null);
  const mealName = mealE ? (T().meals[mealE.meal] || '') : '';
  const foods = mealE ? mealE.foods : '';
  $('t-insight').innerHTML = T().insightHigh(T().dateShort(hi.t), mealName || timingLabel(hi), foods, hi.glu.toFixed(1));
}

function renderTable(a, b) {
  const head = $('loghead'), body = $('logbody'), empty = $('log-empty');
  empty.classList.add('hidden');
  if (view === 'month') {
    $('t-log-h').textContent = T().logHMonth;
    head.innerHTML = T().logColsMonth.map(c => `<th>${c}</th>`).join('');
    const rows = [];
    for (let d = 1; d <= b.getDate(); d++) {
      const day = new Date(a.getFullYear(), a.getMonth(), d);
      const list = entriesIn(day, day);
      if (!list.length) continue;
      const rs = readingsOf(list);
      const highs = rs.filter(r => !inRange(r)).length;
      rows.push(`<tr><td>${T().dateShort(day)}</td><td>${list.length}</td>` +
        `<td class="num">${rs.length ? avg(rs).toFixed(1) : T().none}</td>` +
        `<td class="${highs ? 'flag-high' : ''}">${T().highCount(highs)}</td></tr>`);
    }
    body.innerHTML = rows.join('');
    if (!rows.length) { empty.textContent = T().noRecords; empty.classList.remove('hidden'); }
    return;
  }
  $('t-log-h').textContent = T().logH;
  head.innerHTML = T().logCols.map(c => `<th>${c}</th>`).join('');
  const list = entriesIn(a, b);
  body.innerHTML = list.map(r => {
    const what = mealLabel(r) + (r.foods ? ` · ${r.foods}` : '');
    if (r.glu === null) {
      return `<tr><td>${T().dateShort(r.t)}</td><td>${hhmm(r.t)}</td><td class="what">${what}</td><td class="num">${T().none}</td><td></td></tr>`;
    }
    const ok = inRange(r);
    return `<tr><td>${T().dateShort(r.t)}</td><td>${hhmm(r.t)}</td><td class="what">${what}</td>` +
      `<td class="num">${r.glu.toFixed(1)}</td>` +
      `<td class="${ok ? 'flag-good' : 'flag-high'}">${statusLabel(r)}</td></tr>`;
  }).join('');
  if (!list.length) { empty.textContent = T().noRecords; empty.classList.remove('hidden'); }
}

// ================= master render =================
function render() {
  const t = T();
  document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : 'en';
  $('btn-zh').classList.toggle('active', lang === 'zh');
  $('btn-en').classList.toggle('active', lang === 'en');
  ['day', 'week', 'month'].forEach(v => $('btn-' + v).classList.toggle('active', view === v));
  $('btn-day').textContent = t.viewDay; $('btn-week').textContent = t.viewWeek; $('btn-month').textContent = t.viewMonth;
  $('t-title').textContent = t.title;
  $('link-log').textContent = t.logNow;
  $('t-leg-good').textContent = t.legGood; $('t-leg-high').textContent = t.legHigh;
  $('t-note').textContent = t.note;
  $('reset-link').textContent = t.resetLink;

  const [a, b] = viewRange();
  const now = today();

  if (view === 'day') { $('t-range').textContent = t.dateLong(a); $('p-label').textContent = t.dateShort(a); }
  else if (view === 'week') { $('t-range').textContent = t.weekLabel(a, b); $('p-label').textContent = t.weekLabel(a, b); }
  else { $('t-range').textContent = t.monthLabel(a); $('p-label').textContent = t.monthLabel(a); }
  $('p-next').disabled = view === 'day' ? (sameDay(a, now) || a > now)
    : view === 'week' ? addDays(a, 7) > now
    : new Date(a.getFullYear(), a.getMonth() + 1, 1) > now;

  $('t-chart-h').textContent = view === 'day' ? t.chartHDay : view === 'week' ? t.chartHWeek : t.chartHMonth;
  $('t-chart-note').textContent = view === 'month' ? t.chartNoteMonth : t.chartNote;
  hideTip();
  if (!$('content').classList.contains('hidden')) {
    const C = colors();
    if (view === 'day') drawDay(C, a); else if (view === 'week') drawWeek(C, a, b); else drawMonth(C, a, b);
    $('card-star').classList.toggle('hidden', view === 'day');
    $('card-reward').classList.toggle('hidden', view !== 'week');
    $('card-insight').classList.toggle('hidden', view !== 'week');
    $('t-star-h').textContent = t.starH;
    if (view !== 'day') renderStar(a, b);
    if (view === 'week') { renderReward(a, b); renderInsight(a, b); }
    renderStats(a, b);
    renderTable(a, b);
  }
}

function setLang(l) {
  lang = l;
  if ($('content').classList.contains('hidden') && $('error-card').classList.contains('hidden')) {
    $('loading').textContent = T().loading;
  }
  if (!$('error-card').classList.contains('hidden')) {
    $('error-msg').textContent = T().loadError;
    $('retry-btn').textContent = T().retry;
  }
  render();
}
function setView(v) { view = v; anchor = new Date(); render(); }

// ================= reset (guarded) =================
function openReset() {
  const t = T();
  $('m-title').textContent = t.mTitle;
  $('m-text').textContent = t.mText;
  $('m-input').value = '';
  $('m-input').placeholder = t.mPlaceholder;
  $('m-cancel').textContent = t.mCancel;
  $('m-confirm').textContent = t.mConfirm;
  $('m-confirm').disabled = true;
  $('modal-bg').classList.remove('hidden');
}
function closeReset() { $('modal-bg').classList.add('hidden'); }
function resetInputChanged() {
  $('m-confirm').disabled = $('m-input').value.trim().toUpperCase() !== 'RESET';
}
async function doReset() {
  if ($('m-input').value.trim().toUpperCase() !== 'RESET') return;
  $('m-confirm').disabled = true;
  $('m-confirm').textContent = '…';
  try {
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors',
      body: new URLSearchParams({ action: 'reset', confirm: 'RESET' }) });
  } catch (e) { /* no-cors response is opaque either way */ }
  await new Promise(r => setTimeout(r, 1500));
  closeReset();
  alertMsg(T().resetDone);
  init();
}
function alertMsg(msg) {
  const n = document.createElement('div');
  n.textContent = msg;
  n.style.cssText = 'position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--text-primary);color:var(--surface-1);padding:10px 22px;border-radius:999px;font-size:15px;font-weight:600;z-index:99;';
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 2500);
}

render();       // paint chrome instantly (labels, toggles)
init();         // then load live data
if (window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (!$('content').classList.contains('hidden')) render(); });
</script>
