<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我的血糖">

<title>爸爸的血糖记录 · Dad's Glucose Tracker</title>
<style>
  .viz-root {
    color-scheme: light;
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --gridline: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --good: #0ca30c;
    --good-text: #006300;
    --critical: #d03b3b;
    --band: rgba(42,120,214,0.07);
    --connector: #c3c2b7;
    --star-bg: #fdf6e3;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) .viz-root {
      color-scheme: dark;
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --gridline: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255,255,255,0.10);
      --good: #0ca30c;
      --good-text: #0ca30c;
      --critical: #d03b3b;
      --band: rgba(57,135,229,0.12);
      --connector: #383835;
      --star-bg: #26241d;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body.viz-root {
    font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    padding: 16px;
    max-width: 560px;
    margin: 0 auto;
  }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
  }
  header.card { text-align: center; }
  h1 { font-size: 24px; font-weight: 700; }
  .sub { color: var(--text-secondary); font-size: 15px; margin-top: 4px; }
  .sub-en { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

  .lang-toggle {
    display: inline-flex; margin-top: 12px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--page); overflow: hidden;
  }
  .lang-toggle button {
    font: inherit; font-size: 14px; font-weight: 600;
    padding: 7px 18px; border: none; background: transparent;
    color: var(--text-secondary); cursor: pointer; border-radius: 999px;
  }
  .lang-toggle button.active { background: var(--text-primary); color: var(--surface-1); }

  /* view switcher */
  .view-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .view-toggle button {
    flex: 1; font: inherit; font-size: 16px; font-weight: 600;
    padding: 11px 0; border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface-1); color: var(--text-secondary); cursor: pointer;
  }
  .view-toggle button.active { background: var(--text-primary); color: var(--surface-1); border-color: var(--text-primary); }

  .log-now {
    display: block; text-align: center; text-decoration: none;
    background: var(--good); color: #fff; font-size: 19px; font-weight: 700;
    border-radius: 14px; padding: 15px; margin-bottom: 14px;
  }

  /* day picker */
  .day-picker { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 10px; }
  .day-picker button {
    font: inherit; font-size: 18px; font-weight: 700; line-height: 1;
    width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 50%;
    background: var(--surface-1); color: var(--text-primary); cursor: pointer;
  }
  .day-picker button:disabled { opacity: 0.3; cursor: default; }
  .day-picker .dp-label { font-size: 17px; font-weight: 700; min-width: 150px; text-align: center; }

  /* stat tiles */
  .stats { display: flex; gap: 10px; }
  .stats .card { flex: 1; text-align: center; padding: 14px 6px; margin-bottom: 0; }
  .stat-label { font-size: 14px; color: var(--text-secondary); }
  .stat-value { font-size: 30px; font-weight: 600; margin-top: 2px; }
  .stat-unit { font-size: 13px; color: var(--text-muted); }
  .stat-good { color: var(--good-text); }
  .stats-wrap { margin-bottom: 14px; }

  h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .h2-note { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

  .legend { display: flex; gap: 16px; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  .chart-wrap { position: relative; }
  svg { display: block; width: 100%; height: auto; }
  .tooltip {
    position: absolute; pointer-events: none; display: none;
    background: var(--text-primary); color: var(--surface-1);
    font-size: 13px; line-height: 1.5; padding: 7px 10px; border-radius: 8px;
    transform: translate(-50%, -110%); white-space: nowrap; z-index: 5;
  }

  /* streak: week row */
  .streak { display: flex; gap: 6px; justify-content: space-between; }
  .day-cell { flex: 1; text-align: center; background: var(--star-bg); border-radius: 10px; padding: 8px 0; }
  .day-cell .dname { font-size: 13px; color: var(--text-secondary); }
  .day-cell .star { font-size: 20px; margin-top: 2px; }
  .streak-msg { text-align: center; font-size: 16px; margin-top: 12px; font-weight: 600; }
  .streak-msg .n { color: var(--good-text); }

  /* streak: month grid */
  .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal .cal-h { text-align: center; font-size: 12px; color: var(--text-muted); padding: 2px 0; }
  .cal .cal-d {
    text-align: center; background: var(--star-bg); border-radius: 8px; padding: 4px 0 2px;
    font-size: 11px; color: var(--text-secondary); min-height: 40px;
  }
  .cal .cal-d .star { font-size: 16px; line-height: 1.3; }
  .cal .cal-d.empty { background: transparent; }
  .cal .cal-d.miss { background: var(--gridline); opacity: 0.7; }
  .cal .cal-d.future { background: transparent; border: 1px dashed var(--gridline); opacity: 0.6; }

  .reward-bar { background: var(--gridline); border-radius: 999px; height: 14px; overflow: hidden; margin: 10px 0 6px; }
  .reward-fill { background: var(--good); height: 100%; border-radius: 999px; }
  .reward-line { font-size: 15px; color: var(--text-secondary); }
  .reward-hit { font-size: 17px; font-weight: 700; margin-top: 8px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: var(--text-muted); font-weight: 500; padding: 6px 4px; border-bottom: 1px solid var(--gridline); }
  td { padding: 7px 4px; border-bottom: 1px solid var(--gridline); color: var(--text-secondary); white-space: nowrap; }
  td.num { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text-primary); }
  tr:last-child td { border-bottom: none; }
  .flag-good { color: var(--good-text); font-weight: 600; }
  .flag-high { color: var(--critical); font-weight: 700; }
  .hidden { display: none; }

  .note { font-size: 13px; color: var(--text-muted); text-align: center; padding-bottom: 8px; }
  .insight { background: var(--band); border-radius: 10px; padding: 12px 14px; font-size: 15px; line-height: 1.6; margin-top: 12px; }
  .empty-msg { text-align: center; color: var(--text-muted); font-size: 15px; padding: 30px 0; }
</style>
</head>
<body class="viz-root" data-palette="#0ca30c,#d03b3b">

<header class="card">
  <h1 id="t-title"></h1>
  <div class="sub" id="t-range"></div>
  <div class="sub-en" id="t-subnote"></div>
  <div class="lang-toggle" role="group" aria-label="Language / 语言">
    <button id="btn-zh" onclick="setLang('zh')">中文</button>
    <button id="btn-en" onclick="setLang('en')">English</button>
  </div>
</header>

<div class="view-toggle" role="group" aria-label="View / 视图">
  <button id="btn-day" onclick="setView('day')"></button>
  <button id="btn-week" onclick="setView('week')"></button>
  <button id="btn-month" onclick="setView('month')"></button>
</div>

<a class="log-now" id="link-log" href="index.html"></a>

<div class="stats stats-wrap">
  <div class="card">
    <div class="stat-label" id="s1-label"></div>
    <div class="stat-value" id="s1-value"></div>
    <div class="stat-unit" id="s1-unit"></div>
  </div>
  <div class="card">
    <div class="stat-label" id="s2-label"></div>
    <div class="stat-value stat-good" id="s2-value"></div>
    <div class="stat-unit" id="s2-unit"></div>
  </div>
  <div class="card">
    <div class="stat-label" id="s3-label"></div>
    <div class="stat-value" id="s3-value"></div>
    <div class="stat-unit" id="s3-unit"></div>
  </div>
</div>

<section class="card">
  <div class="day-picker hidden" id="daypicker">
    <button id="dp-prev" onclick="stepDay(-1)">‹</button>
    <div class="dp-label" id="dp-label"></div>
    <button id="dp-next" onclick="stepDay(1)">›</button>
  </div>
  <h2 id="t-chart-h"></h2>
  <div class="h2-note" id="t-chart-note"></div>
  <div class="legend">
    <span><span class="dot" style="background:var(--good)"></span><span id="t-leg-good"></span></span>
    <span><span class="dot" style="background:var(--critical)"></span><span id="t-leg-high"></span></span>
  </div>
  <div class="chart-wrap">
    <svg id="chart" viewBox="0 0 520 300" role="img" aria-label="Glucose chart"></svg>
    <div class="tooltip" id="tip"></div>
  </div>
</section>

<section class="card" id="card-star">
  <h2 id="t-star-h"></h2>
  <div class="h2-note" id="t-star-note"></div>
  <div class="streak" id="streakrow"></div>
  <div class="cal hidden" id="calgrid"></div>
  <div class="streak-msg" id="t-star-msg"></div>
</section>

<section class="card" id="card-reward">
  <h2 id="t-reward-h"></h2>
  <div class="reward-line" id="t-reward-line"></div>
  <div class="reward-bar"><div class="reward-fill" id="reward-fill"></div></div>
  <div class="reward-hit" id="t-reward-hit"></div>
</section>

<section class="card" id="card-insight">
  <h2 id="t-insight-h"></h2>
  <div class="insight" id="t-insight"></div>
</section>

<section class="card">
  <h2 id="t-log-h"></h2>
  <table>
    <thead><tr id="loghead"></tr></thead>
    <tbody id="logbody"></tbody>
  </table>
  <div class="empty-msg hidden" id="log-empty"></div>
</section>

<div class="note" id="t-note"></div>

<script>
// ================= sample data =================
// July 2026 (Jul 1 = Wednesday). day: day of month. type: 'fasting' (target <=7.0) | 'post' (2h after meal, <10.0)
const readings = [
  {day:1,  t:'07:20', type:'fasting', v:6.9}, {day:1,  t:'14:30', type:'post', v:9.2}, {day:1,  t:'20:45', type:'post', v:8.8},
  {day:2,  t:'07:10', type:'fasting', v:7.2}, {day:2,  t:'20:50', type:'post', v:9.1},
  /* Jul 3: no records (missed day) */
  {day:4,  t:'08:00', type:'fasting', v:6.7}, {day:4,  t:'14:10', type:'post', v:9.9},
  {day:5,  t:'07:50', type:'fasting', v:6.4}, {day:5,  t:'20:30', type:'post', v:10.8},
  {day:6,  t:'07:15', type:'fasting', v:7.1}, {day:6,  t:'14:30', type:'post', v:8.6},
  {day:7,  t:'07:05', type:'fasting', v:6.8}, {day:7,  t:'20:40', type:'post', v:8.9},
  {day:8,  t:'07:20', type:'fasting', v:6.6}, {day:8,  t:'14:25', type:'post', v:9.5},
  {day:9,  t:'07:10', type:'fasting', v:6.3}, {day:9,  t:'14:40', type:'post', v:10.3}, {day:9,  t:'21:00', type:'post', v:8.7},
  {day:10, t:'07:25', type:'fasting', v:6.5}, {day:10, t:'20:45', type:'post', v:8.1},
  {day:11, t:'07:45', type:'fasting', v:6.9}, {day:11, t:'14:15', type:'post', v:9.0},
  {day:12, t:'07:30', type:'fasting', v:6.2}, {day:12, t:'20:35', type:'post', v:7.8},
  {day:13, t:'07:15', type:'fasting', v:6.2}, {day:13, t:'14:30', type:'post', v:8.9},
  {day:14, t:'07:00', type:'fasting', v:6.8}, {day:14, t:'14:40', type:'post', v:9.4}, {day:14, t:'21:00', type:'post', v:8.2},
  {day:15, t:'07:20', type:'fasting', v:6.5}, {day:15, t:'21:10', type:'post', v:11.2, extreme:true},
  {day:16, t:'07:05', type:'fasting', v:7.0}, {day:16, t:'14:35', type:'post', v:8.4},
  {day:17, t:'07:10', type:'fasting', v:6.1}, {day:17, t:'20:50', type:'post', v:7.9},
  {day:18, t:'07:40', type:'fasting', v:6.6}, {day:18, t:'14:20', type:'post', v:9.8},
  {day:19, t:'07:30', type:'fasting', v:5.9}, {day:19, t:'20:40', type:'post', v:7.6},
];
const TODAY = 19, WEEK_START = 13, WEEK_END = 19, MONTH_DAYS = 31;
const inRange = r => r.type === 'fasting' ? r.v <= 7.0 : r.v < 10.0;
const wd = d => new Date(2026, 6, d).getDay();                 // 0=Sun
const dayReadings = d => readings.filter(r => r.day === d);
const loggedDays = [...new Set(readings.map(r => r.day))];
const avg = a => a.reduce((s, r) => s + r.v, 0) / a.length;

// ================= i18n =================
const I18N = {
  zh: {
    title: '👴 爸爸的血糖记录',
    subnote: 'Sample data 示范数据',
    dowMonFirst: ['一','二','三','四','五','六','日'],
    dow: d => ['日','一','二','三','四','五','六'][wd(d)],
    dateShort: d => `7/${d}（${I18N.zh.dow(d)}）`,
    dateLong: d => `2026年7月${d}日（${I18N.zh.dow(d)}）`,
    rangeWeek: '2026年7月13日 – 7月19日（第 3 周）',
    rangeMonth: '2026年7月（1日 – 19日）',
    viewDay: '日', viewWeek: '周', viewMonth: '月',
    logNow: '＋ 记血糖',
    avgLabel: '平均血糖', inrangeLabel: '达标次数', unitReadings: '次测量',
    logsToday: '当天记录', unitTimes: '次',
    daysLogged: '记录天数', unitDays: '天 ⭐',
    chartHDay: '当天血糖', chartHWeek: '本周血糖走势', chartHMonth: '本月血糖（每日平均）',
    chartNote: '目标范围 4.0 – 10.0 mmol/L（空腹 ≤ 7.0）',
    chartNoteMonth: '每点为当天平均 · 红色 = 当天有偏高读数',
    legGood: '✓ 达标', legHigh: '! 偏高',
    fastGuide: '空腹目标 ≤ 7.0', bandLabel: '目标范围 4.0–10.0',
    starH: '记录之星 ⭐', starNoteWeek: '每天有记录就得一颗星', starNoteMonth: '本月的星星月历',
    starMsgWeek: n => `太棒了！本周 <span class="n">${n}</span> 天全勤 👏`,
    starMsgMonth: (n, total) => `本月已记录 <span class="n">${n}</span>/${total} 天，只漏了 1 天，加油！`,
    rewardH: '本周奖励 🎁',
    rewardLine: n => `目标：一周 7 天都有记录 · 本周已记录 <b>${n}/7 天</b>`,
    rewardHit: '✅ 达标！奖励：周末全家去饮茶 🍵',
    rewardMiss: n => `还差 ${7 - n} 天，继续加油！`,
    insightH: '本周小发现 💡',
    insight: '7月15日聚餐（晚餐吃得比较丰盛）之后，血糖升到 <b>11.2</b>，是本周唯一一次偏高。其他日子都保持得很好 —— 尤其空腹血糖，一整周都在目标以内。继续保持！',
    logH: '测量记录', logHMonth: '每日小结',
    logCols: ['日期', '时间', '类型', '血糖', '状态'],
    logColsMonth: ['日期', '记录', '平均', '偏高'],
    fasting: '空腹', post: '饭后2小时',
    ok: '✓ 达标', high: '! 偏高', none: '—',
    highCount: n => n === 0 ? '—' : `${n} 次`,
    noRecords: '这一天没有记录',
    note: '＊本页为示范数据，用来展示日报、周报、月报的样子',
    extremeNote: '聚餐后',
  },
  en: {
    title: "👴 Dad's Glucose Tracker",
    subnote: 'Sample data 示范数据',
    dowMonFirst: ['M','T','W','T','F','S','S'],
    dow: d => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][wd(d)],
    dateShort: d => `${I18N.en.dow(d)} 7/${d}`,
    dateLong: d => `${I18N.en.dow(d)}, Jul ${d}, 2026`,
    rangeWeek: 'Jul 13 – Jul 19, 2026 (Week 3)',
    rangeMonth: 'July 2026 (Jul 1 – 19)',
    viewDay: 'Daily', viewWeek: 'Weekly', viewMonth: 'Monthly',
    logNow: '＋ Log a reading',
    avgLabel: 'Average glucose', inrangeLabel: 'In range', unitReadings: 'readings',
    logsToday: 'Logs today', unitTimes: 'entries',
    daysLogged: 'Days logged', unitDays: 'days ⭐',
    chartHDay: "The day's readings", chartHWeek: "This week's glucose trend", chartHMonth: 'Monthly glucose (daily averages)',
    chartNote: 'Target range 4.0 – 10.0 mmol/L (fasting ≤ 7.0)',
    chartNoteMonth: 'Each dot = daily average · red = a high reading that day',
    legGood: '✓ In range', legHigh: '! High',
    fastGuide: 'Fasting target ≤ 7.0', bandLabel: 'Target range 4.0–10.0',
    starH: 'Star tracker ⭐', starNoteWeek: 'One star for every day with a log', starNoteMonth: 'Star calendar for the month',
    starMsgWeek: n => `Amazing! <span class="n">${n}</span>/7 days this week 👏`,
    starMsgMonth: (n, total) => `<span class="n">${n}</span>/${total} days logged this month — only 1 day missed. Keep going!`,
    rewardH: "This week's reward 🎁",
    rewardLine: n => `Goal: log something every day · <b>${n}/7 days</b> this week`,
    rewardHit: '✅ Goal met! Reward: family dim sum this weekend 🍵',
    rewardMiss: n => `${7 - n} more day(s) to go!`,
    insightH: 'Insight of the week 💡',
    insight: 'After the big family dinner on Jul 15, glucose rose to <b>11.2</b> — the only high reading this week. Every other day stayed on track, especially fasting glucose, which was within target all week. Keep it up!',
    logH: 'Readings log', logHMonth: 'Daily summary',
    logCols: ['Date', 'Time', 'Type', 'Glucose', 'Status'],
    logColsMonth: ['Date', 'Logs', 'Avg', 'High'],
    fasting: 'Fasting', post: '2h after meal',
    ok: '✓ In range', high: '! High', none: '—',
    highCount: n => n === 0 ? '—' : `${n}×`,
    noRecords: 'No records this day',
    note: '* Sample data — a preview of the daily, weekly and monthly views',
    extremeNote: 'family dinner',
  }
};
let lang = 'zh', view = 'week', dayIdx = TODAY;

// ================= chart plumbing =================
const W = 520, H = 300, padL = 34, padR = 12, padT = 14, padB = 34;
const yMin = 3, yMax = 13;
const plotW = W - padL - padR, plotH = H - padT - padB;
const yPos = v => padT + (yMax - v) / (yMax - yMin) * plotH;
const css = n => getComputedStyle(document.body).getPropertyValue(n).trim();
const svg = document.getElementById('chart');
const NS = 'http://www.w3.org/2000/svg';
const el = (tag, attrs) => {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
};
const $ = id => document.getElementById(id);
const tip = $('tip');

function tipAt(cx, cy, html) {
  const rect = svg.getBoundingClientRect();
  tip.style.left = (cx / W * rect.width) + 'px';
  tip.style.top = (cy / H * rect.height) + 'px';
  tip.innerHTML = html;
  tip.style.display = 'block';
}
function hideTip() { tip.style.display = 'none'; }

function chartBase(C) {
  svg.innerHTML = '';
  // target band + gridlines + fasting guide + baseline
  svg.appendChild(el('rect', {x: padL, y: yPos(10), width: plotW, height: yPos(4) - yPos(10), fill: C.band}));
  [4, 6, 8, 10, 12].forEach(v => {
    svg.appendChild(el('line', {x1: padL, y1: yPos(v), x2: W - padR, y2: yPos(v), stroke: C.grid, 'stroke-width': 1}));
    const t = el('text', {x: padL - 6, y: yPos(v) + 4, 'text-anchor': 'end', 'font-size': 12, fill: C.muted});
    t.textContent = v; svg.appendChild(t);
  });
  svg.appendChild(el('line', {x1: padL, y1: yPos(7), x2: W - padR, y2: yPos(7), stroke: C.base, 'stroke-width': 1}));
  const g7 = el('text', {x: padL + 6, y: yPos(7) + 14, 'font-size': 11, fill: C.muted});
  g7.textContent = I18N[lang].fastGuide; svg.appendChild(g7);
  const bl = el('text', {x: padL + 6, y: yPos(4) - 6, 'font-size': 11, fill: C.muted});
  bl.textContent = I18N[lang].bandLabel; svg.appendChild(bl);
  svg.appendChild(el('line', {x1: padL, y1: H - padB, x2: W - padR, y2: H - padB, stroke: C.base, 'stroke-width': 1}));
}

function colors() {
  return { grid: css('--gridline'), base: css('--baseline'), muted: css('--text-muted'),
    sec: css('--text-secondary'), good: css('--good'), crit: css('--critical'),
    surf: css('--surface-1'), conn: css('--connector'), band: css('--band') };
}

function dotWithRing(cx, cy, color, C, hoverHtml) {
  svg.appendChild(el('circle', {cx, cy, r: 7, fill: C.surf}));
  svg.appendChild(el('circle', {cx, cy, r: 5, fill: color}));
  const hit = el('circle', {cx, cy, r: 14, fill: 'transparent', style: 'cursor:pointer'});
  hit.addEventListener('mouseenter', () => tipAt(cx, cy, hoverHtml));
  hit.addEventListener('mouseleave', hideTip);
  hit.addEventListener('click', () => tipAt(cx, cy, hoverHtml));
  svg.appendChild(hit);
}

const mins = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };

// ---- daily view: 24h axis ----
function drawDay(C) {
  const T = I18N[lang];
  chartBase(C);
  const data = dayReadings(dayIdx);
  [0, 6, 12, 18, 24].forEach(h => {
    const x = padL + h / 24 * plotW;
    const t = el('text', {x, y: H - padB + 18, 'text-anchor': h === 0 ? 'start' : h === 24 ? 'end' : 'middle', 'font-size': 12, fill: C.sec});
    t.textContent = `${String(h).padStart(2, '0')}:00`; svg.appendChild(t);
  });
  if (!data.length) {
    const t = el('text', {x: W / 2, y: H / 2, 'text-anchor': 'middle', 'font-size': 15, fill: C.muted});
    t.textContent = T.noRecords; svg.appendChild(t);
    return;
  }
  const xP = r => padL + mins(r.t) / 1440 * plotW;
  if (data.length > 1) {
    const pts = data.map(r => `${xP(r).toFixed(1)},${yPos(r.v).toFixed(1)}`).join(' ');
    svg.appendChild(el('polyline', {points: pts, fill: 'none', stroke: C.conn, 'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round'}));
  }
  data.forEach(r => {
    const cx = xP(r), cy = yPos(r.v);
    dotWithRing(cx, cy, inRange(r) ? C.good : C.crit, C,
      `${r.t} · ${T[r.type]}<br><b>${r.v.toFixed(1)} mmol/L</b> ${inRange(r) ? T.ok : T.high}`);
    const lb = el('text', {x: cx, y: cy - 14, 'text-anchor': 'middle', 'font-size': 13, 'font-weight': 700, fill: C.sec});
    lb.textContent = r.v.toFixed(1); svg.appendChild(lb);
    const tl = el('text', {x: cx, y: cy - 28, 'text-anchor': 'middle', 'font-size': 10, fill: C.muted});
    tl.textContent = T[r.type]; svg.appendChild(tl);
  });
}

// ---- weekly view ----
function drawWeek(C) {
  const T = I18N[lang];
  chartBase(C);
  const data = readings.filter(r => r.day >= WEEK_START && r.day <= WEEK_END);
  const xP = r => padL + ((r.day - WEEK_START) + 0.15 + mins(r.t) / 1440 * 0.7) / 7 * plotW;
  for (let d = WEEK_START; d <= WEEK_END; d++) {
    const cx = padL + (d - WEEK_START + 0.5) / 7 * plotW;
    const t = el('text', {x: cx, y: H - padB + 18, 'text-anchor': 'middle', 'font-size': 12, fill: C.sec});
    t.textContent = lang === 'zh' ? I18N.zh.dow(d) : I18N.en.dow(d); svg.appendChild(t);
    const dt = el('text', {x: cx, y: H - padB + 31, 'text-anchor': 'middle', 'font-size': 10, fill: C.muted});
    dt.textContent = `7/${d}`; svg.appendChild(dt);
  }
  const pts = data.map(r => `${xP(r).toFixed(1)},${yPos(r.v).toFixed(1)}`).join(' ');
  svg.appendChild(el('polyline', {points: pts, fill: 'none', stroke: C.conn, 'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round'}));
  data.forEach(r => {
    dotWithRing(xP(r), yPos(r.v), inRange(r) ? C.good : C.crit, C,
      `${T.dateShort(r.day)} ${r.t}<br>${T[r.type]} · <b>${r.v.toFixed(1)} mmol/L</b> ${inRange(r) ? T.ok : T.high}`);
  });
  const hi = data.reduce((a, b) => (b.v > a.v ? b : a));
  const lb = el('text', {x: xP(hi), y: yPos(hi.v) - 12, 'text-anchor': 'middle', 'font-size': 13, 'font-weight': 700, fill: C.sec});
  lb.textContent = `${hi.v.toFixed(1)} (${T.extremeNote})`; svg.appendChild(lb);
}

// ---- monthly view: daily averages ----
function drawMonth(C) {
  const T = I18N[lang];
  chartBase(C);
  const daily = loggedDays.map(d => {
    const rs = dayReadings(d);
    return {day: d, avg: avg(rs), n: rs.length, highs: rs.filter(r => !inRange(r)).length};
  });
  const xP = d => padL + (d - 0.5) / MONTH_DAYS * plotW;
  [1, 5, 10, 15, 19, 25, 31].forEach(d => {
    const t = el('text', {x: xP(d), y: H - padB + 18, 'text-anchor': 'middle', 'font-size': 12, fill: d <= TODAY ? C.sec : C.muted});
    t.textContent = d; svg.appendChild(t);
  });
  const ml = el('text', {x: W - padR, y: H - padB + 31, 'text-anchor': 'end', 'font-size': 10, fill: C.muted});
  ml.textContent = lang === 'zh' ? '2026年7月 · 日' : 'July 2026 · day of month'; svg.appendChild(ml);
  const pts = daily.map(x => `${xP(x.day).toFixed(1)},${yPos(x.avg).toFixed(1)}`).join(' ');
  svg.appendChild(el('polyline', {points: pts, fill: 'none', stroke: C.conn, 'stroke-width': 2, 'stroke-linejoin': 'round', 'stroke-linecap': 'round'}));
  daily.forEach(x => {
    dotWithRing(xP(x.day), yPos(x.avg), x.highs ? C.crit : C.good, C,
      `${T.dateShort(x.day)}<br>${lang === 'zh' ? `${x.n} 次测量 · 平均` : `${x.n} readings · avg`} <b>${x.avg.toFixed(1)}</b><br>${lang === 'zh' ? `偏高 ${x.highs} 次` : `${x.highs} high`}`);
  });
  const worst = daily.reduce((a, b) => (b.avg > a.avg ? b : a));
  const lb = el('text', {x: xP(worst.day), y: yPos(worst.avg) - 12, 'text-anchor': 'middle', 'font-size': 13, 'font-weight': 700, fill: C.sec});
  lb.textContent = `7/${worst.day}: ${worst.avg.toFixed(1)}`; svg.appendChild(lb);
}

// ================= sections =================
function renderStats() {
  const T = I18N[lang];
  let data, s3l, s3v, s3u;
  if (view === 'day') {
    data = dayReadings(dayIdx);
    s3l = T.logsToday; s3v = String(data.length); s3u = T.unitTimes;
  } else if (view === 'week') {
    data = readings.filter(r => r.day >= WEEK_START && r.day <= WEEK_END);
    const days = new Set(data.map(r => r.day)).size;
    s3l = T.daysLogged; s3v = `${days}<span style="font-size:16px; color:var(--text-muted);">/7</span>`; s3u = T.unitDays;
  } else {
    data = readings;
    s3l = T.daysLogged; s3v = `${loggedDays.length}<span style="font-size:16px; color:var(--text-muted);">/${TODAY}</span>`; s3u = T.unitDays;
  }
  const ok = data.filter(inRange).length;
  $('s1-label').textContent = T.avgLabel;
  $('s1-value').textContent = data.length ? avg(data).toFixed(1) : T.none;
  $('s1-unit').textContent = 'mmol/L';
  $('s2-label').textContent = T.inrangeLabel;
  $('s2-value').innerHTML = data.length ? `${ok}<span style="font-size:16px; color:var(--text-muted);">/${data.length}</span>` : T.none;
  $('s2-unit').textContent = T.unitReadings;
  $('s3-label').textContent = s3l; $('s3-value').innerHTML = s3v; $('s3-unit').textContent = s3u;
}

function renderStar() {
  const T = I18N[lang];
  if (view === 'week') {
    $('streakrow').classList.remove('hidden'); $('calgrid').classList.add('hidden');
    $('t-star-note').textContent = T.starNoteWeek;
    const days = [];
    for (let d = WEEK_START; d <= WEEK_END; d++) days.push(d);
    $('streakrow').innerHTML = days.map(d =>
      `<div class="day-cell"><div class="dname">${T.dow(d)}</div><div class="star">${dayReadings(d).length ? '⭐' : ''}</div></div>`).join('');
    const n = days.filter(d => dayReadings(d).length).length;
    $('t-star-msg').innerHTML = T.starMsgWeek(n);
  } else {
    $('streakrow').classList.add('hidden'); $('calgrid').classList.remove('hidden');
    $('t-star-note').textContent = T.starNoteMonth;
    let cells = T.dowMonFirst.map(d => `<div class="cal-h">${d}</div>`).join('');
    const offset = (wd(1) + 6) % 7;                       // Monday-first offset
    for (let i = 0; i < offset; i++) cells += '<div class="cal-d empty"></div>';
    for (let d = 1; d <= MONTH_DAYS; d++) {
      if (d > TODAY) cells += `<div class="cal-d future">${d}</div>`;
      else if (dayReadings(d).length) cells += `<div class="cal-d">${d}<div class="star">⭐</div></div>`;
      else cells += `<div class="cal-d miss">${d}</div>`;
    }
    $('calgrid').innerHTML = cells;
    $('t-star-msg').innerHTML = T.starMsgMonth(loggedDays.length, TODAY);
  }
}

function renderReward() {
  const T = I18N[lang];
  const days = new Set(readings.filter(r => r.day >= WEEK_START && r.day <= WEEK_END).map(r => r.day)).size;
  $('t-reward-h').innerHTML = T.rewardH;
  $('t-reward-line').innerHTML = T.rewardLine(days);
  $('reward-fill').style.width = Math.min(100, days / 7 * 100) + '%';
  $('t-reward-hit').innerHTML = days >= 7 ? T.rewardHit : T.rewardMiss(days);
}

function renderTable() {
  const T = I18N[lang];
  const head = $('loghead'), body = $('logbody'), empty = $('log-empty');
  empty.classList.add('hidden');
  if (view === 'month') {
    $('t-log-h').textContent = T.logHMonth;
    head.innerHTML = T.logColsMonth.map(c => `<th>${c}</th>`).join('');
    body.innerHTML = loggedDays.map(d => {
      const rs = dayReadings(d), highs = rs.filter(r => !inRange(r)).length;
      return `<tr><td>${T.dateShort(d)}</td><td>${rs.length}</td><td class="num">${avg(rs).toFixed(1)}</td>` +
        `<td class="${highs ? 'flag-high' : ''}">${T.highCount(highs)}</td></tr>`;
    }).join('');
    return;
  }
  $('t-log-h').textContent = T.logH;
  head.innerHTML = T.logCols.map(c => `<th>${c}</th>`).join('');
  const data = view === 'day' ? dayReadings(dayIdx)
    : readings.filter(r => r.day >= WEEK_START && r.day <= WEEK_END);
  body.innerHTML = data.map(r => {
    const ok = inRange(r);
    return `<tr><td>${T.dateShort(r.day)}</td><td>${r.t}</td><td>${T[r.type]}</td>` +
      `<td class="num">${r.v.toFixed(1)}</td>` +
      `<td class="${ok ? 'flag-good' : 'flag-high'}">${ok ? T.ok : T.high}</td></tr>`;
  }).join('');
  if (!data.length) { empty.textContent = T.noRecords; empty.classList.remove('hidden'); }
}

// ================= master render =================
function render() {
  const T = I18N[lang];
  document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : 'en';
  $('btn-zh').classList.toggle('active', lang === 'zh');
  $('btn-en').classList.toggle('active', lang === 'en');
  ['day', 'week', 'month'].forEach(v => $('btn-' + v).classList.toggle('active', view === v));
  $('btn-day').textContent = T.viewDay; $('btn-week').textContent = T.viewWeek; $('btn-month').textContent = T.viewMonth;
  $('link-log').textContent = T.logNow;

  $('t-title').textContent = T.title;
  $('t-subnote').textContent = T.subnote;
  $('t-range').textContent = view === 'day' ? T.dateLong(dayIdx) : view === 'week' ? T.rangeWeek : T.rangeMonth;
  $('t-leg-good').textContent = T.legGood; $('t-leg-high').textContent = T.legHigh;
  $('t-note').textContent = T.note;

  // day picker
  $('daypicker').classList.toggle('hidden', view !== 'day');
  if (view === 'day') {
    $('dp-label').textContent = T.dateShort(dayIdx);
    $('dp-prev').disabled = dayIdx <= 1;
    $('dp-next').disabled = dayIdx >= TODAY;
  }

  // chart
  $('t-chart-h').textContent = view === 'day' ? T.chartHDay : view === 'week' ? T.chartHWeek : T.chartHMonth;
  $('t-chart-note').textContent = view === 'month' ? T.chartNoteMonth : T.chartNote;
  hideTip();
  const C = colors();
  if (view === 'day') drawDay(C); else if (view === 'week') drawWeek(C); else drawMonth(C);

  // cards
  $('card-star').classList.toggle('hidden', view === 'day');
  $('card-reward').classList.toggle('hidden', view !== 'week');
  $('card-insight').classList.toggle('hidden', view !== 'week');
  $('t-star-h').textContent = I18N[lang].starH;
  if (view !== 'day') renderStar();
  if (view === 'week') { renderReward(); $('t-insight-h').textContent = T.insightH; $('t-insight').innerHTML = T.insight; }

  renderStats();
  renderTable();
}

function setLang(l) { lang = l; render(); }
function setView(v) { view = v; render(); }
function stepDay(dir) {
  let d = dayIdx + dir;
  while (d >= 1 && d <= TODAY && false) d += dir;   // all days selectable, incl. missed
  dayIdx = Math.max(1, Math.min(TODAY, d));
  render();
}

render();
if (window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', render);
</script>
</body>
</html>
