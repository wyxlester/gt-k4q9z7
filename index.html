<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="记血糖">
<link rel="apple-touch-icon" href="icon-log.png">
<link rel="icon" type="image/png" href="icon-log.png">
<link rel="manifest" href="manifest-log.json">
<title>记血糖 · Log Glucose</title>
<style>
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --gridline: #e1e0d9;
    --border: rgba(11,11,11,0.10);
    --good: #0ca30c;
    --good-text: #006300;
    --warn: #d03b3b;
    --accent: #2a78d6;
    --accent-soft: rgba(42,120,214,0.10);
    --star-bg: #fdf6e3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --gridline: #2c2c2a;
      --border: rgba(255,255,255,0.10);
      --good: #0ca30c;
      --good-text: #0ca30c;
      --warn: #e66767;
      --accent: #3987e5;
      --accent-soft: rgba(57,135,229,0.16);
      --star-bg: #26241d;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    max-width: 480px;
    margin: 0 auto;
    padding: 14px 16px 24px;
    min-height: 100vh;
  }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .back-btn {
    font: inherit; font-size: 17px; font-weight: 600; color: var(--text-secondary);
    background: none; border: none; cursor: pointer; padding: 8px 10px 8px 0; visibility: hidden;
  }
  .back-btn.show { visibility: visible; }
  .lang-toggle {
    display: inline-flex; border: 1px solid var(--border); border-radius: 999px;
    background: var(--surface-1); overflow: hidden;
  }
  .lang-toggle button {
    font: inherit; font-size: 13px; font-weight: 600; padding: 5px 12px; border: none;
    background: transparent; color: var(--text-secondary); cursor: pointer; border-radius: 999px;
  }
  .lang-toggle button.active { background: var(--text-primary); color: var(--surface-1); }

  .q { font-size: 26px; font-weight: 700; text-align: center; margin: 14px 0 4px; }
  .q-sub { font-size: 15px; color: var(--text-muted); text-align: center; margin-bottom: 18px; }

  .big-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .big-btn {
    font: inherit; cursor: pointer;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px 8px; text-align: center;
  }
  .big-btn .emoji { font-size: 40px; display: block; }
  .big-btn .lbl { font-size: 21px; font-weight: 700; margin-top: 6px; display: block; }
  .big-btn.wide { grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 18px 8px; }
  .big-btn.wide .emoji { font-size: 32px; }
  .big-btn.wide .lbl { margin-top: 0; }
  .big-btn:active, .big-btn.selected { background: var(--accent-soft); border-color: var(--accent); }

  .chips { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .chip {
    font: inherit; font-size: 17px; font-weight: 600; cursor: pointer;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 4px; text-align: center; color: var(--text-primary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .chip.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .chip.other { border-style: dashed; color: var(--text-secondary); }

  .other-row { display: none; gap: 10px; margin-top: 12px; }
  .other-row.show { display: flex; }
  .other-row input {
    flex: 1; font: inherit; font-size: 18px; padding: 13px 14px;
    border: 1px solid var(--accent); border-radius: 14px;
    background: var(--surface-1); color: var(--text-primary); min-width: 0;
  }
  .other-row button {
    font: inherit; font-size: 17px; font-weight: 700; padding: 0 20px;
    border: none; border-radius: 14px; background: var(--accent); color: #fff; cursor: pointer;
  }

  .primary-btn, .ghost-btn {
    font: inherit; display: block; width: 100%; cursor: pointer;
    font-size: 22px; font-weight: 700; border-radius: 16px; padding: 17px; margin-top: 14px;
    border: none;
  }
  .primary-btn { background: var(--good); color: #fff; }
  .primary-btn:disabled { opacity: 0.35; cursor: default; }
  .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); font-size: 18px; font-weight: 600; }
  .ghost-btn.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .glu-display {
    text-align: center; font-size: 56px; font-weight: 700; letter-spacing: 1px;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 18px;
    padding: 12px; margin-bottom: 6px; min-height: 96px;
  }
  .glu-display .unit { font-size: 17px; font-weight: 500; color: var(--text-muted); display: block; margin-top: -6px; }
  .glu-display.placeholder { color: var(--text-muted); }
  .glu-warn { text-align: center; font-size: 14px; color: var(--warn); min-height: 20px; margin-bottom: 2px; }
  .pad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .pad button {
    font: inherit; font-size: 28px; font-weight: 600; cursor: pointer;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 0; color: var(--text-primary);
  }
  .pad button:active { background: var(--accent-soft); }

  .summary { background: var(--surface-1); border: 1px solid var(--border); border-radius: 18px; padding: 8px 18px; margin-bottom: 6px; }
  .sum-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--gridline); }
  .sum-row:last-child { border-bottom: none; }
  .sum-label { font-size: 16px; color: var(--text-muted); }
  .sum-value { font-size: 20px; font-weight: 700; text-align: right; max-width: 65%; }
  .sum-row.tappable { cursor: pointer; }
  .sum-row.tappable .sum-value { color: var(--accent); }
  .sum-hint { font-size: 12px; font-weight: 500; color: var(--text-muted); display: block; }

  /* time editor */
  .time-editor {
    display: none; background: var(--surface-1); border: 1px solid var(--accent);
    border-radius: 18px; padding: 16px; margin-bottom: 6px;
  }
  .time-editor.show { display: block; }
  .te-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  .te-days { display: flex; gap: 10px; margin-bottom: 12px; }
  .te-days button, .te-presets button {
    font: inherit; font-size: 16px; font-weight: 600; cursor: pointer;
    background: var(--page); border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 6px; color: var(--text-primary); flex: 1;
  }
  .te-days button.selected, .te-presets button.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .te-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .te-custom { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .te-custom label { font-size: 15px; color: var(--text-secondary); }
  .te-custom input {
    flex: 1; font: inherit; font-size: 18px; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--page); color: var(--text-primary);
  }
  .te-warn { font-size: 14px; color: var(--warn); min-height: 20px; }
  .te-done {
    font: inherit; display: block; width: 100%; cursor: pointer;
    font-size: 17px; font-weight: 700; border-radius: 12px; padding: 12px;
    border: none; background: var(--text-primary); color: var(--surface-1);
  }

  .success { text-align: center; padding-top: 30px; }
  .success .big-star { font-size: 92px; }
  .success h2 { font-size: 30px; margin: 10px 0 6px; }
  .success p { font-size: 18px; color: var(--text-secondary); line-height: 1.6; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="backbtn" onclick="goBack()">‹ <span id="t-back"></span></button>
  <div class="lang-toggle">
    <button id="btn-zh" onclick="setLang('zh')">中文</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- STEP: meal -->
<div id="step-meal">
  <div class="q" id="q-meal"></div>
  <div class="q-sub" id="q-meal-sub"></div>
  <div class="big-btns" id="meal-btns"></div>
  <button class="ghost-btn" id="backfill-btn" onclick="toggleBackfill()"></button>
  <a class="ghost-btn" id="link-report" style="text-align:center; text-decoration:none;" href="report.html"></a>
</div>

<!-- STEP: foods -->
<div id="step-foods" class="hidden">
  <div class="q" id="q-foods"></div>
  <div class="q-sub" id="q-foods-sub"></div>
  <div class="chips" id="food-chips"></div>
  <div class="other-row" id="other-row">
    <input id="other-input" autocomplete="off">
    <button onclick="addOther()" id="other-add"></button>
  </div>
  <button class="primary-btn" id="foods-next" onclick="toGlucose()"></button>
</div>

<!-- STEP: glucose -->
<div id="step-glu" class="hidden">
  <div class="q" id="q-glu"></div>
  <div class="q-sub" id="q-glu-sub"></div>
  <div class="glu-display placeholder" id="glu-display"></div>
  <div class="glu-warn" id="glu-warn"></div>
  <div class="pad">
    <button onclick="pad('1')">1</button><button onclick="pad('2')">2</button><button onclick="pad('3')">3</button>
    <button onclick="pad('4')">4</button><button onclick="pad('5')">5</button><button onclick="pad('6')">6</button>
    <button onclick="pad('7')">7</button><button onclick="pad('8')">8</button><button onclick="pad('9')">9</button>
    <button onclick="pad('.')">·</button><button onclick="pad('0')">0</button><button onclick="pad('del')">⌫</button>
  </div>
  <button class="primary-btn" id="glu-next" onclick="toTiming()" disabled></button>
  <button class="ghost-btn" id="glu-skip" onclick="skipGlucose()"></button>
</div>

<!-- STEP: timing -->
<div id="step-timing" class="hidden">
  <div class="q" id="q-timing"></div>
  <div class="q-sub" id="q-timing-sub"></div>
  <div class="big-btns" id="timing-btns"></div>
</div>

<!-- STEP: confirm -->
<div id="step-confirm" class="hidden">
  <div class="q" id="q-confirm"></div>
  <div class="q-sub">&nbsp;</div>
  <div class="summary" id="summary"></div>
  <div class="time-editor" id="time-editor">
    <div class="te-title" id="te-title"></div>
    <div class="te-days">
      <button id="te-yest" onclick="setDayOffset(-1)"></button>
      <button id="te-today" onclick="setDayOffset(0)"></button>
    </div>
    <div class="te-presets" id="te-presets"></div>
    <div class="te-custom">
      <label id="te-custom-lbl"></label>
      <input type="time" id="te-time" onchange="setCustomTime()">
    </div>
    <div class="te-warn" id="te-warn"></div>
    <button class="te-done" id="te-done" onclick="closeTimeEditor()"></button>
  </div>
  <button class="primary-btn" id="submit-btn" onclick="submitLog()"></button>
</div>

<!-- STEP: success -->
<div id="step-success" class="hidden">
  <div class="success">
    <div class="big-star">⭐</div>
    <h2 id="ok-title"></h2>
    <p id="ok-msg"></p>
    <button class="primary-btn" id="ok-done" onclick="reset()"></button>
    <a class="ghost-btn" id="ok-report" style="text-align:center; text-decoration:none;" href="report.html"></a>
  </div>
</div>

<script>
// ====== backend endpoint ======
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbziaghYfMv1nmmnIdXfq_Xbg1wvgehk6Yx5KTZVn3uz3A8eBPTUYgfw1kcpF1BUKrxGeQ/exec';
const CUSTOM_KEY = 'gt_custom_foods';

// default foods: zh label is the canonical value stored in the sheet
const DEFAULT_FOODS = [
  {zh:'咖椰吐司', en:'Kaya toast'}, {zh:'鸡饭', en:'Chicken rice'}, {zh:'鱼汤', en:'Fish soup'},
  {zh:'粥', en:'Porridge'}, {zh:'面', en:'Noodles'}, {zh:'菜饭', en:'Cai fan'},
  {zh:'水果', en:'Fruit'}, {zh:'咖啡 / 茶', en:'Coffee / Tea'},
];

const I18N = {
  zh: {
    back: '返回',
    qMeal: '现在记录什么？', qMealSub: '选一个',
    meals: [
      {id:'breakfast', emoji:'🌅', label:'早餐'}, {id:'lunch', emoji:'☀️', label:'午餐'},
      {id:'snack', emoji:'🍪', label:'点心'}, {id:'dinner', emoji:'🌙', label:'晚餐'},
    ],
    onlyTest: {emoji:'🩸', label:'只测血糖'},
    backfill: '🕐 补记昨天的记录',
    backfillOn: '✓ 正在补记昨天（点击取消）',
    viewReport: '📈 看我的血糖',
    qFoods: '吃了什么？', qFoodsSub: '可以选几样，也可以跳过',
    otherChip: '其他 ✏️',
    otherPlaceholder: '输入吃了什么（可用语音）',
    otherAdd: '添加',
    foodsNext: '下一步 →', foodsNextSkip: '跳过 →',
    qGlu: '血糖多少？', qGluSub: '按数字输入（mmol/L）',
    gluPlaceholder: '例如 6.8',
    gluNext: '下一步 →', gluSkip: '这餐没量血糖，跳过',
    gluWarnRange: '请输入 1.0 – 33.0 之间的数字',
    qTiming: '什么时候量的？', qTimingSub: '选一个',
    timings: [
      {id:'fasting', emoji:'🌄', label:'空腹 / 饭前'},
      {id:'post', emoji:'🍚', label:'饭后 2 小时'},
    ],
    qConfirm: '确认一下',
    sumMeal: '记录', sumFoods: '吃了', sumGlu: '血糖', sumTiming: '时间点', sumTime: '时间',
    sumTimeHint: '点击可改时间',
    mealName: {breakfast:'早餐', lunch:'午餐', snack:'点心', dinner:'晚餐', test:'只测血糖'},
    timingName: {fasting:'空腹 / 饭前', post:'饭后 2 小时'},
    noGlu: '没有量',
    today: '今天', yesterday: '昨天',
    teTitle: '什么时候吃 / 量的？',
    tePresets: [{label:'早上 7:00', h:7, m:0}, {label:'中午 12:30', h:12, m:30}, {label:'下午 3:00', h:15, m:0}, {label:'晚上 7:00', h:19, m:0}],
    teCustom: '其他时间：',
    teWarnFuture: '不能选未来的时间',
    teDone: '好了 ✓',
    submit: '✓ 提交',
    okTitle: '记录成功！',
    okMsgs: '又得一颗星！<br>今天做得很好 👏',
    okMsgsBackfill: '昨天的记录补上了！⭐',
    okDone: '完成',
  },
  en: {
    back: 'Back',
    qMeal: 'What are you logging?', qMealSub: 'Pick one',
    meals: [
      {id:'breakfast', emoji:'🌅', label:'Breakfast'}, {id:'lunch', emoji:'☀️', label:'Lunch'},
      {id:'snack', emoji:'🍪', label:'Snack'}, {id:'dinner', emoji:'🌙', label:'Dinner'},
    ],
    onlyTest: {emoji:'🩸', label:'Just a glucose test'},
    backfill: "🕐 Log for yesterday",
    backfillOn: '✓ Logging for yesterday (tap to cancel)',
    viewReport: '📈 View my glucose',
    qFoods: 'What did you eat?', qFoodsSub: 'Pick a few, or skip',
    otherChip: 'Other ✏️',
    otherPlaceholder: 'Type what you ate (voice works)',
    otherAdd: 'Add',
    foodsNext: 'Next →', foodsNextSkip: 'Skip →',
    qGlu: 'Glucose reading?', qGluSub: 'Type the number (mmol/L)',
    gluPlaceholder: 'e.g. 6.8',
    gluNext: 'Next →', gluSkip: "Didn't test this time — skip",
    gluWarnRange: 'Please enter a number between 1.0 – 33.0',
    qTiming: 'When did you test?', qTimingSub: 'Pick one',
    timings: [
      {id:'fasting', emoji:'🌄', label:'Fasting / before meal'},
      {id:'post', emoji:'🍚', label:'2 hours after meal'},
    ],
    qConfirm: 'Confirm',
    sumMeal: 'Logging', sumFoods: 'Ate', sumGlu: 'Glucose', sumTiming: 'Timing', sumTime: 'Time',
    sumTimeHint: 'Tap to change',
    mealName: {breakfast:'Breakfast', lunch:'Lunch', snack:'Snack', dinner:'Dinner', test:'Glucose test'},
    timingName: {fasting:'Fasting / before meal', post:'2h after meal'},
    noGlu: 'Not tested',
    today: 'Today', yesterday: 'Yesterday',
    teTitle: 'When did you eat / test?',
    tePresets: [{label:'7:00 am', h:7, m:0}, {label:'12:30 pm', h:12, m:30}, {label:'3:00 pm', h:15, m:0}, {label:'7:00 pm', h:19, m:0}],
    teCustom: 'Other time:',
    teWarnFuture: "Can't pick a future time",
    teDone: 'Done ✓',
    submit: '✓ Submit',
    okTitle: 'Logged!',
    okMsgs: 'Another star earned!<br>Great job today 👏',
    okMsgsBackfill: "Yesterday's record is in! ⭐",
    okDone: 'Done',
  }
};

let lang = 'zh';
const state = { meal: null, foodsSel: [], glu: '', timing: null, when: null };
// when: null = "now" (server stamps) | {off: 0|-1, h, m}
const STEPS = ['meal', 'foods', 'glu', 'timing', 'confirm', 'success'];
let step = 'meal';
const $ = id => document.getElementById(id);
const T = () => I18N[lang];

// ---- custom foods (remembered on this phone) ----
function loadCustom() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || '[]'); } catch (e) { return []; }
}
function saveCustom(list) {
  try { localStorage.setItem(CUSTOM_KEY, JSON.stringify(list.slice(0, 30))); } catch (e) {}
}
function rememberFood(text) {
  const list = loadCustom().filter(x => x !== text);
  list.unshift(text);
  saveCustom(list);
}

function show(s) {
  step = s;
  STEPS.forEach(x => $('step-' + x).classList.toggle('hidden', x !== s));
  $('backbtn').classList.toggle('show', s !== 'meal' && s !== 'success');
  if (s !== 'confirm') closeTimeEditor(true);
  window.scrollTo(0, 0);
}

function renderStatic() {
  const t = T();
  document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : 'en';
  $('btn-zh').classList.toggle('active', lang === 'zh');
  $('btn-en').classList.toggle('active', lang === 'en');
  $('t-back').textContent = t.back;

  $('q-meal').textContent = t.qMeal; $('q-meal-sub').textContent = t.qMealSub;
  $('meal-btns').innerHTML = t.meals.map(m =>
    `<button class="big-btn" onclick="pickMeal('${m.id}')"><span class="emoji">${m.emoji}</span><span class="lbl">${m.label}</span></button>`
  ).join('') +
  `<button class="big-btn wide" onclick="pickMeal('test')"><span class="emoji">${t.onlyTest.emoji}</span><span class="lbl">${t.onlyTest.label}</span></button>`;
  renderBackfillBtn();
  $('link-report').textContent = t.viewReport;

  $('q-foods').textContent = t.qFoods; $('q-foods-sub').textContent = t.qFoodsSub;
  renderChips();
  $('other-input').placeholder = t.otherPlaceholder;
  $('other-add').textContent = t.otherAdd;
  $('foods-next').textContent = state.foodsSel.length ? t.foodsNext : t.foodsNextSkip;

  $('q-glu').textContent = t.qGlu; $('q-glu-sub').textContent = t.qGluSub;
  $('glu-next').textContent = t.gluNext; $('glu-skip').textContent = t.gluSkip;
  renderGlu();

  $('q-timing').textContent = t.qTiming; $('q-timing-sub').textContent = t.qTimingSub;
  $('timing-btns').innerHTML = t.timings.map(x =>
    `<button class="big-btn wide" onclick="pickTiming('${x.id}')"><span class="emoji">${x.emoji}</span><span class="lbl">${x.label}</span></button>`).join('');

  $('q-confirm').textContent = t.qConfirm;
  $('submit-btn').textContent = t.submit;
  renderSummary();
  renderTimeEditor();

  $('ok-title').textContent = t.okTitle;
  $('ok-msg').innerHTML = state.when && state.when.off === -1 ? t.okMsgsBackfill : t.okMsgs;
  $('ok-done').textContent = t.okDone;
  $('ok-report').textContent = t.viewReport;
}

function setLang(l) { lang = l; renderStatic(); }

// ---- backfill toggle (home screen) ----
function renderBackfillBtn() {
  const active = state.when && state.when.off === -1;
  $('backfill-btn').textContent = active ? T().backfillOn : T().backfill;
  $('backfill-btn').classList.toggle('selected', active);
}
function toggleBackfill() {
  if (state.when && state.when.off === -1) state.when = null;
  else {
    const n = new Date();
    state.when = { off: -1, h: n.getHours(), m: n.getMinutes() };
  }
  renderBackfillBtn();
}

// ---- meal ----
function pickMeal(id) {
  state.meal = id;
  if (id === 'test') { state.foodsSel = []; $('glu-skip').classList.add('hidden'); show('glu'); }
  else { $('glu-skip').classList.remove('hidden'); show('foods'); }
  renderStatic();
}

// ---- foods ----
function chipLabel(val) {
  const def = DEFAULT_FOODS.find(f => f.zh === val);
  return def ? (lang === 'zh' ? def.zh : def.en) : val;
}
function renderChips() {
  const t = T();
  const customs = loadCustom();
  const items = DEFAULT_FOODS.map(f => f.zh).concat(customs.filter(c => !DEFAULT_FOODS.some(f => f.zh === c)));
  $('food-chips').innerHTML = items.map(val => {
    const sel = state.foodsSel.includes(val);
    return `<button class="chip${sel ? ' selected' : ''}" onclick="toggleFood(${JSON.stringify(val).replace(/"/g, '&quot;')})">${chipLabel(val)}</button>`;
  }).join('') + `<button class="chip other" onclick="showOther()">${t.otherChip}</button>`;
  $('foods-next').textContent = state.foodsSel.length ? t.foodsNext : t.foodsNextSkip;
}
function toggleFood(val) {
  const k = state.foodsSel.indexOf(val);
  if (k >= 0) state.foodsSel.splice(k, 1); else state.foodsSel.push(val);
  renderChips();
}
function showOther() {
  $('other-row').classList.add('show');
  $('other-input').focus();
}
function addOther() {
  const text = $('other-input').value.trim();
  if (!text) return;
  if (!state.foodsSel.includes(text)) state.foodsSel.push(text);
  rememberFood(text);
  $('other-input').value = '';
  renderChips();
}
function toGlucose() {
  const pending = $('other-input').value.trim();
  if (pending) addOther();
  show('glu');
}

// ---- glucose ----
function renderGlu() {
  const t = T(), d = $('glu-display');
  if (state.glu) {
    d.classList.remove('placeholder');
    d.innerHTML = `${state.glu}<span class="unit">mmol/L</span>`;
  } else {
    d.classList.add('placeholder');
    d.innerHTML = `${t.gluPlaceholder}<span class="unit">mmol/L</span>`;
  }
  const v = parseFloat(state.glu);
  const valid = !isNaN(v) && v >= 1 && v <= 33;
  $('glu-next').disabled = !valid;
  $('glu-warn').textContent = state.glu && !valid && state.glu.length >= 2 ? t.gluWarnRange : '';
}
function pad(k) {
  if (k === 'del') state.glu = state.glu.slice(0, -1);
  else if (k === '.') { if (!state.glu.includes('.') && state.glu) state.glu += '.'; }
  else if (state.glu.replace('.', '').length < 3) state.glu += k;
  renderGlu();
}
function skipGlucose() { state.glu = ''; state.timing = null; show('confirm'); renderStatic(); }
function toTiming() { show('timing'); }
function pickTiming(id) { state.timing = id; show('confirm'); renderStatic(); }

// ---- time handling ----
function whenDate() {
  if (!state.when) return null;
  const d = new Date();
  d.setDate(d.getDate() + state.when.off);
  d.setHours(state.when.h, state.when.m, 0, 0);
  return d;
}
function whenIsFuture() {
  const d = whenDate();
  return d !== null && d > new Date();
}
function whenText() {
  const t = T();
  const n = new Date();
  if (!state.when) return `${t.today} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  const dayName = state.when.off === -1 ? t.yesterday : t.today;
  return `${dayName} ${String(state.when.h).padStart(2,'0')}:${String(state.when.m).padStart(2,'0')}`;
}

function renderSummary() {
  const t = T();
  if (!state.meal) { $('summary').innerHTML = ''; return; }
  const rows = [];
  rows.push([t.sumMeal, t.mealName[state.meal], '']);
  if (state.meal !== 'test' && state.foodsSel.length)
    rows.push([t.sumFoods, state.foodsSel.map(chipLabel).join('、'), '']);
  rows.push([t.sumGlu, state.glu ? `${state.glu} mmol/L` : t.noGlu, '']);
  if (state.glu && state.timing) rows.push([t.sumTiming, t.timingName[state.timing], '']);
  rows.push([t.sumTime, whenText(), 'time']);
  $('summary').innerHTML = rows.map(([a, b, kind]) => {
    if (kind === 'time') {
      return `<div class="sum-row tappable" onclick="openTimeEditor()"><span class="sum-label">${a}<span class="sum-hint">${t.sumTimeHint}</span></span><span class="sum-value">${b} ›</span></div>`;
    }
    return `<div class="sum-row"><span class="sum-label">${a}</span><span class="sum-value">${b}</span></div>`;
  }).join('');
  $('submit-btn').disabled = whenIsFuture();
}

// ---- time editor ----
function openTimeEditor() {
  if (!state.when) {
    const n = new Date();
    state.when = { off: 0, h: n.getHours(), m: n.getMinutes() };
  }
  renderTimeEditor();
  $('time-editor').classList.add('show');
}
function closeTimeEditor(silent) {
  $('time-editor').classList.remove('show');
  if (!silent) { renderSummary(); }
}
function renderTimeEditor() {
  const t = T();
  $('te-title').textContent = t.teTitle;
  $('te-yest').textContent = t.yesterday;
  $('te-today').textContent = t.today;
  $('te-custom-lbl').textContent = t.teCustom;
  $('te-done').textContent = t.teDone;
  const w = state.when;
  $('te-yest').classList.toggle('selected', !!w && w.off === -1);
  $('te-today').classList.toggle('selected', !w || w.off === 0);
  $('te-presets').innerHTML = t.tePresets.map((p, i) =>
    `<button onclick="setPreset(${p.h},${p.m})" class="${w && w.h === p.h && w.m === p.m ? 'selected' : ''}">${p.label}</button>`).join('');
  if (w) $('te-time').value = `${String(w.h).padStart(2,'0')}:${String(w.m).padStart(2,'0')}`;
  $('te-warn').textContent = whenIsFuture() ? t.teWarnFuture : '';
  $('submit-btn').disabled = whenIsFuture();
}
function setDayOffset(off) {
  if (!state.when) openTimeEditor();
  state.when.off = off;
  renderTimeEditor(); renderSummary();
  $('time-editor').classList.add('show');
}
function setPreset(h, m) {
  if (!state.when) openTimeEditor();
  state.when.h = h; state.when.m = m;
  renderTimeEditor(); renderSummary();
  $('time-editor').classList.add('show');
}
function setCustomTime() {
  const v = $('te-time').value;
  if (!v) return;
  const [h, m] = v.split(':').map(Number);
  if (!state.when) openTimeEditor();
  state.when.h = h; state.when.m = m;
  renderTimeEditor(); renderSummary();
  $('time-editor').classList.add('show');
}

function goBack() {
  if (step === 'foods') show('meal');
  else if (step === 'glu') show(state.meal === 'test' ? 'meal' : 'foods');
  else if (step === 'timing') show('glu');
  else if (step === 'confirm') show(state.glu ? 'timing' : 'glu');
}

async function submitLog() {
  if (whenIsFuture()) return;
  $('submit-btn').disabled = true;
  if (SCRIPT_URL) {
    const params = {
      meal: state.meal,
      foods: state.foodsSel.join(', '),
      glucose: state.glu,
      timing: state.timing || '',
      lang: lang,
    };
    const d = whenDate();
    if (d) params.ts = d.toISOString();
    try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(params) }); }
    catch (e) { /* no-cors response is opaque either way */ }
  }
  $('submit-btn').disabled = false;
  renderStatic();
  show('success');
}

function reset() {
  state.meal = null; state.foodsSel = []; state.glu = ''; state.timing = null; state.when = null;
  $('other-row').classList.remove('show');
  renderStatic();
  show('meal');
}

renderStatic();
show('meal');
</script>
</body>
</html>
